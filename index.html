<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>We Don't Stop</title>
    <link rel="manifest" href="/we-dont-stop/manifest.json">
    <meta name="theme-color" content="#e87a45">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="We Don't Stop">
    <link rel="apple-touch-icon" href="/we-dont-stop/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg: #090f1e;
            --card-cream: #ede9e1;
            --card-yellow: #f0c52e;
            --card-coral: #c84b38;
            --card-navy: #141e32;
            --text-dark: #18191f;
            --text-cream: #f5f0e8;
            --muted-dark: #6b6b77;
            --muted-light: #5a5a66;
            --green: #3db87a;
            --blue: #4a8fd9;
            --purple: #9b7dd4;
            --orange: #e87a45;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
            --navy-texture: repeating-linear-gradient(45deg, rgba(255,255,255,0.028) 0px, rgba(255,255,255,0.028) 1px, transparent 1px, transparent 7px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body, #root { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: var(--font-body); background: var(--card-cream); color: var(--text-dark); }

        .app { width: 100%; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 88px; -webkit-overflow-scrolling: touch; }
        .screen::-webkit-scrollbar { display: none; }
        .pad { padding-left: 18px; padding-right: 18px; }

        /* ── Typography helpers ── */
        .overline { font-family: var(--font-body); font-size: 10px; font-weight: 500; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted-dark); }
        .page-title { font-family: var(--font-display); font-size: 54px; font-weight: 500; color: var(--text-dark); margin-bottom: 8px; }
        .card-label { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-light); margin-bottom: 4px; }
        .card-title-serif { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--text-dark); line-height: 1.1; margin-bottom: 3px; }
        .card-sub { font-size: 12px; line-height: 1.35; color: var(--muted-light); }
        .chevron { color: var(--muted-light); font-size: 18px; font-weight: 300; flex-shrink: 0; }

        /* ── HOJE ── */
        .hoje-header { padding: 56px 20px 18px; }
        .hoje-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .hoje-name { font-family: var(--font-display); font-size: 46px; font-weight: 500; line-height: 1; color: var(--text-dark); }
        .hoje-mood { font-family: var(--font-display); font-size: 30px; font-weight: 400; font-style: italic; color: var(--muted-dark); line-height: 1; }
        .top-actions { display: flex; align-items: center; gap: 10px; padding-top: 4px; flex-shrink: 0; }
        .bell { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.5; border: 1.5px solid rgba(24,25,31,0.18); border-radius: 50%; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--card-navy); border: 1px solid rgba(245,240,232,0.15); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--text-cream); cursor: pointer; }

        /* ── Cards Stack ── */
        .cards-stack { display: flex; flex-direction: column; gap: 10px; padding: 4px 16px 28px; }
        .card { border-radius: 20px; overflow: hidden; cursor: pointer; transition: transform 0.18s ease, opacity 0.18s ease; }
        .card:active { transform: scale(0.975); opacity: 0.9; }

        .card-readiness { background: #ffffff; padding: 18px 16px 18px 18px; display: flex; align-items: center; gap: 14px; }
        .readiness-body { flex: 1; min-width: 0; }

        .card-avaliacao { background: var(--card-yellow); padding: 18px; display: flex; align-items: center; gap: 14px; }
        .card-avaliacao .card-label { color: rgba(24,25,31,0.5); }
        .card-avaliacao .card-title-serif { color: var(--text-dark); }
        .card-avaliacao .card-sub { color: rgba(24,25,31,0.55); }
        .card-avaliacao .chevron { color: rgba(24,25,31,0.35); }

        .icon-box { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icon-box-yellow { background: rgba(24,25,31,0.12); }
        .icon-box-coral  { background: rgba(245,240,232,0.15); }

        .card-regata { background: var(--card-coral); padding: 18px; display: flex; align-items: center; gap: 14px; }
        .card-regata .card-label { color: rgba(245,240,232,0.6); }
        .card-regata .card-title-serif { color: var(--text-cream); }
        .card-regata .card-sub { color: rgba(245,240,232,0.65); }
        .card-regata .chevron { color: rgba(245,240,232,0.4); }

        .card-streak { background: var(--card-navy); padding: 12px 18px 14px; }
        .streak-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .streak-num-row { display: flex; align-items: baseline; gap: 8px; }
        .streak-num { font-family: var(--font-display); font-size: 48px; font-weight: 600; line-height: 1; color: var(--text-cream); }
        .streak-dias { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(245,240,232,0.45); padding-bottom: 8px; }
        .streak-motto { font-family: var(--font-display); font-size: 15px; font-style: italic; font-weight: 400; color: rgba(245,240,232,0.6); margin-bottom: 12px; }
        .dots-row { display: flex; gap: 5px; align-items: center; }
        .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .timeline-labels { display: flex; justify-content: space-between; margin-top: 5px; }
        .timeline-lbl { font-size: 9px; color: rgba(245,240,232,0.35); }

        .card-sessao { background: var(--card-navy); padding: 16px 18px 18px; }
        .sessao-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .badge-hoje { background: var(--orange); color: #fff; font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 3px 9px; border-radius: 4px; text-transform: uppercase; }
        .sessao-title { font-family: var(--font-display); font-size: 38px; font-weight: 500; line-height: 1.05; color: var(--text-cream); }

        /* ── Iniciar Sessão sticky ── */
        .iniciar-sessao-bar { background: var(--card-coral); padding: 13px 18px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .iniciar-sessao-txt { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: #fff; }

        /* ── 5 Pilares ── */
        .section-block { padding: 20px 16px 4px; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
        .section-title-serif { font-family: var(--font-display); font-size: 28px; font-weight: 500; color: var(--text-dark); line-height: 1; }
        .section-link { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; color: var(--muted-dark); text-transform: uppercase; }
        .pilares-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 16px 16px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .pilares-scroll::-webkit-scrollbar { display: none; }
        .pilar-card { background: #fff; border-radius: 16px; padding: 14px; min-width: 100px; flex-shrink: 0; }
        .pilar-num { font-family: var(--font-display); font-size: 32px; font-weight: 600; color: var(--text-dark); line-height: 1; margin: 8px 0 2px; }
        .pilar-name { font-size: 11px; font-weight: 500; color: var(--muted-dark); margin-bottom: 8px; }
        .pilar-bar { height: 3px; border-radius: 2px; }

        /* ── Carga card ── */
        .card-carga { background: #fff; padding: 18px; display: flex; align-items: center; gap: 16px; }
        .carga-info { flex: 1; }
        .carga-title { font-family: var(--font-display); font-size: 20px; font-weight: 500; color: var(--text-dark); margin-bottom: 4px; }
        .carga-sub { font-size: 11px; color: var(--muted-dark); }

        /* ── Condições ── */
        .card-condicoes { background: var(--card-navy); padding: 16px 18px; border-radius: 20px; margin: 0 16px 10px; }
        .cond-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .cond-title { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(245,240,232,0.45); }
        .cond-time { font-size: 9px; font-weight: 600; letter-spacing: 1px; color: rgba(245,240,232,0.35); text-transform: uppercase; }
        .cond-grid { display: flex; gap: 0; }
        .cond-col { flex: 1; }
        .cond-val { font-family: var(--font-display); font-size: 28px; font-weight: 500; color: var(--text-cream); line-height: 1; }
        .cond-unit { font-size: 13px; font-weight: 400; color: rgba(245,240,232,0.6); margin-left: 2px; }
        .cond-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(245,240,232,0.4); margin-top: 2px; }
        .cond-sub { font-size: 11px; color: rgba(245,240,232,0.4); margin-top: 1px; }

        /* ── Mensagem ── */
        .msg-card { background: rgba(200,75,56,0.08); border-radius: 16px; padding: 14px 16px; margin: 0 16px 28px; }
        .msg-row { display: flex; align-items: flex-start; gap: 12px; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--card-coral); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .msg-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
        .msg-time { font-size: 11px; color: var(--muted-dark); margin-left: 6px; }
        .msg-text { font-size: 13px; color: var(--text-dark); line-height: 1.5; margin-top: 6px; font-style: italic; }

        /* ── Bottom Nav ── */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 82px; background: var(--card-cream); border-top: 1px solid rgba(24,25,31,0.08); display: flex; align-items: flex-start; padding-top: 10px; z-index: 100; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 0 2px; opacity: 0.38; transition: opacity 0.2s; }
        .nav-tab.active { opacity: 1; }
        .nav-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; color: var(--text-dark); }
        .nav-lbl { font-size: 8.5px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text-dark); }

        /* ── Overlay base ── */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 100px; }
        .overlay::-webkit-scrollbar { display: none; }
        .overlay-topbar { display: flex; align-items: center; justify-content: center; padding: 22px 20px 14px; position: relative; }
        .overlay-close { position: absolute; left: 20px; width: 32px; height: 32px; border-radius: 50%; background: var(--card-navy); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .overlay-title-lbl { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted-dark); }

        /* ── Testes ── */
        .page-header { padding: 56px 20px 16px; }
        .page-desc { font-size: 13px; color: var(--muted-dark); line-height: 1.55; margin-bottom: 18px; }
        .quote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .quote-card { background: var(--card-navy); border-radius: 16px; padding: 16px; }
        .quote-card-t { font-family: var(--font-display); font-size: 16px; font-weight: 600; font-style: italic; color: var(--text-cream); margin-bottom: 5px; }
        .quote-card-s { font-size: 11px; color: var(--muted-dark); line-height: 1.4; }
        .level-card { background: var(--card-yellow); border-radius: 18px; padding: 20px; margin-bottom: 12px; }
        .level-overline { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(24,25,31,0.48); margin-bottom: 4px; }
        .level-title { font-family: var(--font-display); font-size: 58px; font-weight: 700; color: var(--text-dark); line-height: 1; margin-bottom: 5px; }
        .level-sub { font-size: 12px; color: rgba(24,25,31,0.58); margin-bottom: 14px; }
        .bar-bg { height: 5px; background: rgba(24,25,31,0.15); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; }
        .battery-hdr { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .battery-ol { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-dark); margin-bottom: 3px; }
        .battery-count { font-family: var(--font-display); font-size: 28px; font-weight: 500; color: var(--text-dark); line-height: 1; }
        .battery-count span { font-size: 14px; color: var(--muted-dark); margin-left: 4px; }
        .btn-refazer { background: var(--card-navy); color: var(--text-cream); border: none; border-radius: 8px; padding: 9px 14px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; font-family: var(--font-body); text-transform: uppercase; }
        .test-item { background: #ffffff; border-radius: 16px; padding: 16px 18px; margin-bottom: 9px; }
        .test-item-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .test-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; margin-bottom: 6px; }
        .test-name { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text-dark); }
        .test-desc { font-size: 11px; color: var(--muted-light); }
        .test-score { text-align: right; }
        .test-score-num { font-family: var(--font-display); font-size: 34px; font-weight: 600; color: var(--text-dark); line-height: 1; }
        .test-score-u { font-size: 11px; color: var(--muted-light); }
        .tag { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; margin-top: 6px; }
        .tag-avancado { background: rgba(61,184,122,0.15);  color: #3db87a; }
        .tag-solido   { background: rgba(240,197,46,0.2);   color: #b49218; }
        .tag-forte    { background: rgba(20,184,166,0.14);  color: #0f766e; }
        .tag-bom      { background: rgba(74,143,217,0.15);  color: #4a8fd9; }
        .tag-moderado { background: rgba(155,125,212,0.15); color: #9b7dd4; }
        .test-section-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-dark); margin: 14px 0 8px; }

        /* ── Pulso ── */
        .readiness-big-card { background: #ffffff; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; }
        .readiness-detail { flex: 1; }
        .readiness-hl { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text-dark); margin-bottom: 10px; }
        .readiness-rows { display: flex; flex-direction: column; gap: 4px; }
        .readiness-row { display: flex; justify-content: space-between; font-size: 11px; }
        .readiness-key { color: var(--muted-light); }
        .readiness-val { color: var(--text-dark); font-weight: 600; }
        .readiness-delta { color: var(--green); font-weight: 400; margin-left: 4px; }
        .period-bar { display: flex; gap: 8px; margin-bottom: 14px; }
        .period-btn { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; font-family: var(--font-body); transition: all 0.2s; }
        .period-btn.on  { background: var(--text-dark); color: var(--text-cream); }
        .period-btn.off { background: rgba(24,25,31,0.08); color: var(--text-dark); }
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .metric-card { background: #ffffff; border-radius: 16px; padding: 14px; }
        .metric-hdr { display: flex; justify-content: space-between; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .metric-name-txt { color: var(--muted-light); }
        .metric-val { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: var(--text-dark); line-height: 1; }
        .metric-unit { font-size: 11px; color: var(--muted-light); }
        .metric-delta { font-size: 11px; font-weight: 600; margin-bottom: 8px; }
        .d-pos { color: var(--green); } .d-neg { color: var(--orange); }
        .sparkline-wrap { height: 36px; }
        .forma-card { background: var(--card-navy); border-radius: 18px; padding: 20px; margin-bottom: 12px; }
        .forma-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-dark); margin-bottom: 8px; }
        .forma-mood { font-family: var(--font-display); font-size: 28px; font-weight: 400; font-style: italic; color: var(--text-cream); }
        .forma-val { font-family: var(--font-display); font-size: 52px; font-weight: 600; color: var(--text-cream); line-height: 1; text-align: right; }
        .forma-unit { font-size: 13px; color: var(--muted-dark); text-align: right; }

        /* ── Conexões ── */
        .cx-title { font-family: var(--font-display); font-size: 44px; font-weight: 500; color: var(--text-dark); line-height: 1.1; }
        .cx-title-italic { font-family: var(--font-display); font-size: 44px; font-weight: 400; font-style: italic; color: var(--card-coral); line-height: 1.1; margin-bottom: 10px; }
        .cx-desc { font-size: 13px; color: var(--muted-dark); line-height: 1.5; }
        .flow-card { background: var(--card-navy); border-radius: 16px; padding: 16px; margin-bottom: 20px; }
        .flow-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-dark); margin-bottom: 12px; }
        .flow-pills { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .pill { background: rgba(245,240,232,0.12); color: var(--text-cream); font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 20px; }
        .pill-regata { background: var(--card-coral); }
        .flow-arrow { color: var(--muted-dark); font-size: 16px; }
        .flow-desc { font-size: 11px; color: var(--muted-dark); line-height: 1.4; }
        .cx-count { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-dark); margin-bottom: 5px; }
        .cx-section-title { font-family: var(--font-display); font-size: 32px; font-weight: 500; color: var(--text-dark); margin-bottom: 10px; }
        .cx-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: #ffffff; border-radius: 18px; margin-bottom: 9px; }
        .cx-icon { width: 64px; height: 64px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .cx-info { flex: 1; min-width: 0; }
        .cx-name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
        .cx-name { font-size: 14px; font-weight: 600; color: var(--text-dark); }
        .cx-online { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
        .cx-data { font-size: 12px; color: var(--muted-dark); }
        .cx-sync { font-size: 10px; color: rgba(24,25,31,0.35); margin-top: 2px; }
        .cx-action { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted-dark); cursor: pointer; border: 1px solid rgba(24,25,31,0.16); border-radius: 20px; padding: 7px 14px; background: transparent; font-family: var(--font-body); flex-shrink: 0; }
        .cx-action-add { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--card-coral); cursor: pointer; border: 1px solid rgba(200,75,56,0.3); border-radius: 20px; padding: 7px 14px; background: transparent; font-family: var(--font-body); flex-shrink: 0; }
        .cx-item-inactive { opacity: 0.55; }

        /* ── Sessão Ativa ── */
        .sessao-screen { min-height: 100vh; background: var(--bg); padding-bottom: 100px; }
        .sessao-nav { display: flex; align-items: center; justify-content: space-between; padding: 24px 20px 12px; }
        .back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .sessao-progress-wrap { height: 4px; background: rgba(245,240,232,0.1); border-radius: 2px; overflow: hidden; margin: 0 20px 18px; }

    const { useState, useMemo, useRef, useEffect } = React;

    /* ── Sparkline ── */
    function Sparkline({ data, color, avgLine }) {
        if (!data || !data.length) return null;
        const W = 100, H = 36;
        const max = Math.max(...data, avgLine || 0, 1);
        const stride = W / data.length;
        const bw  = Math.max(stride - 2, 1);
        return (
            <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
                {data.map((v, i) => {
                    const bh    = v > 0 ? Math.max(Math.round((v / max) * (H - 4)), 3) : 0;
                    const below = avgLine != null && v > 0 && v < avgLine * 0.95;
                    const isToday = i === data.length - 1;
                    const fill  = below ? '#e87a45' : isToday ? color : `${color}88`;
                    return <rect key={i} x={i * stride} y={H - bh} width={bw} height={bh} rx="2" fill={fill}/>;
                })}
                {avgLine != null && (
                    <line
                        x1="0" y1={H - Math.round((avgLine / max) * (H - 4))}
                        x2={W} y2={H - Math.round((avgLine / max) * (H - 4))}
                        stroke={color} strokeWidth="1" strokeDasharray="4,3" opacity="0.6"
                    />
                )}
            </svg>
        );
    }

    /* ── Readiness Circle ── */
    function ReadinessCircle({ score, size = 84 }) {
        const r = size / 2 - 6, c = 2 * Math.PI * r;
        const off = c - (score / 100) * c;
        return (
            <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
                <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(24,25,31,0.1)" strokeWidth="5"/>
                <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#3db87a" strokeWidth="5"
                    strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
                    transform={`rotate(-90 ${size/2} ${size/2})`}/>
                <text x={size/2} y={size/2-3} textAnchor="middle" fontSize="22" fontWeight="600"
                    fontFamily="'Cormorant Garamond',serif" fill="#18191f">{score}</text>
                <text x={size/2} y={size/2+12} textAnchor="middle" fontSize="8" fontWeight="600"
                    letterSpacing="1" fontFamily="'DM Sans',sans-serif" fill="#3db87a">VERDE</text>
            </svg>
        );
    }

    function SailIcon() {

                <line x1="3" y1="21" x2="23" y2="21" stroke="rgba(245,240,232,0.6)" strokeWidth="1.5"/>

    /* ── Streak Dots ── */
    function StreakDots({ total = 22 }) {
        const hist = getHistory();
        const doneSet = new Set(hist.map(e => e.date));
        const today = new Date().toLocaleDateString('sv');
        const dots = Array.from({length: total}, (_, i) => {
            const daysAgo = total - 1 - i;
            const d = new Date();
            d.setDate(d.getDate() - daysAgo);
            const dateStr = d.toLocaleDateString('sv');
            const isToday = dateStr === today;
            const done = doneSet.has(dateStr);
            return { isToday, done };
        });
        return (
            <div>
                <div className="dots-row">
                    {dots.map(({isToday, done}, i) => (
                        <div key={i} className="dot" style={{
                            width: isToday ? 8 : 6, height: isToday ? 8 : 6,
                            background: done ? '#e87a45' : isToday ? 'rgba(245,240,232,0.5)' : 'rgba(245,240,232,0.15)',
                        }}/>
                    ))}
                </div>
                <div className="timeline-labels">
                    <span className="timeline-lbl">-21d</span>
                    <span className="timeline-lbl">hoje</span>
                </div>
            </div>
        );
    }

    /* ── Activity Heatmap ── */
    function Heatmap({ weeks = 38 }) {
        const data = useMemo(() => {
            const hist = getHistory();
            const plenoSet  = new Set(hist.filter(e => !e.isMinimo).map(e => e.date));
            const minimoSet = new Set(hist.filter(e =>  e.isMinimo).map(e => e.date));
            const days = weeks * 7;
            return Array.from({length: days}, (_, i) => {
                const daysAgo = days - 1 - i;
                const d = new Date();
                d.setDate(d.getDate() - daysAgo);
                const key = d.toLocaleDateString('sv');
                return plenoSet.has(key) ? 2 : minimoSet.has(key) ? 1 : 0;
            });
        }, [weeks]);

        const cols = [];
        for (let w = 0; w < weeks; w++) cols.push(data.slice(w*7,(w+1)*7));

        const color = v => v===0 ? 'rgba(245,240,232,0.08)' : v===1 ? '#f0c52e' : '#c84b38';

        return (
            <div className="heatmap-grid">
                {cols.map((col, wi) => (
                    <div key={wi} className="heat-col">
                        {Array.from({length:7}).map((_,di) => (
                            <div key={di} className="heat-sq" style={{ background: color(col[di] ?? 0) }}/>
                        ))}
                    </div>
                ))}
            </div>
        );
    }

    function getBiometricAlerts() {
        const log = getBiometricLog();
        if (log.length < 3) return [];
        const last7 = log.slice(-7);
        const alerts = [];
        // HRV trend: if last entry < average of previous entries by >10%
        const hrvEntries = last7.filter(e => e.hrv > 0);
        if (hrvEntries.length >= 3) {
            const avg = hrvEntries.slice(0,-1).reduce((a,e) => a + e.hrv, 0) / (hrvEntries.length - 1);
            if (hrvEntries[hrvEntries.length-1].hrv < avg * 0.90)
                alerts.push({ type:'hrv', msg:'HRV abaixo da sua média — priorize recuperação hoje.' });
        }
        // Disposição <= 2 por 2+ dias
        const lowDisp = last7.slice(-3).filter(e => e.disposicao > 0 && e.disposicao <= 2);
        if (lowDisp.length >= 2)
            alerts.push({ type:'disp', msg:'Disposição baixa por vários dias — semana pesada, reduza o volume.' });
        // Sono < 7h por 3+ dias consecutivos
        const last3 = last7.slice(-3);
        if (last3.length === 3 && last3.every(e => e.sono > 0 && e.sono < 7))
            alerts.push({ type:'sono', msg:`Déficit de sono acumulado (${last3.map(e=>e.sono+'h').join(', ')}) — afeta performance e recuperação.` });
        return alerts;
    }

    function calcReadiness() {
        const todayStr = new Date().toLocaleDateString('sv');
        const bioLog   = getBiometricLog();
        const bioToday = bioLog.slice().reverse().find(e => e.date === todayStr);
        if (bioToday) {
            const b = bioToday;
            let score = 0, parts = 0;
            if (b.hrv > 0) {
                const log = bioLog.filter(e => e.hrv > 0);
                const avg = log.length > 1 ? log.slice(0,-1).reduce((a,e) => a + e.hrv, 0) / (log.length - 1) : b.hrv;
                score += Math.min(Math.round((b.hrv / avg) * 65), 90); parts++;
            }
            if (b.disposicao > 0) { score += Math.round((b.disposicao / 5) * 85); parts++; }
            if (b.sono > 0)       { score += Math.min(Math.round((b.sono / 8) * 85), 90); parts++; }
            if (parts > 0) return Math.min(Math.round(score / parts), 99);
        }
        const aval = getAvaliacao();
        if (!aval?.scores) return null;
        const s = aval.scores;
        const vals = [s.core, s.forca, s.endurance, s.mobilidade].filter(v => typeof v === 'number');
        if (!vals.length) return null;
        return Math.round(40 + (vals.reduce((a, b) => a + b, 0) / vals.length) * 0.55);
    }

    function getMetricSeries(field, days) {
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - days);
        const cutoffStr = cutoff.toLocaleDateString('sv');
        return getBiometricLog()
            .filter(e => (e[field] || 0) > 0 && e.date >= cutoffStr);
    }

    function getMetricBaseline(field, days) {
        const series = getMetricSeries(field, days);
        if (!series.length) return null;
        return series.reduce((a, e) => a + (e[field] || 0), 0) / series.length;
    }

    function getDailyLoads() {
        const map = {};
        getHistory().forEach(h => {
            if (h.rpe && h.totalMs) {
                map[h.date] = (map[h.date] || 0) + h.rpe * (h.totalMs / 3600000);
            }
        });
        return map;
    }

    function buildTSBData(numDays) {
        const loads = getDailyLoads();
        const today = new Date();
        let ctl = 0, atl = 0;
        const result = [];
        for (let i = numDays - 1; i >= 0; i--) {
            const d = new Date(today);
            d.setDate(today.getDate() - i);
            const dateStr = d.toLocaleDateString('sv');
            const load = loads[dateStr] || 0;
            ctl = ctl + (load - ctl) * (1 - Math.exp(-1 / 42));
            atl = atl + (load - atl) * (1 - Math.exp(-1 / 7));
            result.push({
                date: dateStr,
                ctl:  Math.round(ctl  * 10) / 10,
                atl:  Math.round(atl  * 10) / 10,
                tsb:  Math.round((ctl - atl) * 10) / 10,
            });
        }
        return result;
    }

    function degToCompass(deg) {
        const d = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
        return d[Math.round(deg / 22.5) % 16];
    }
    function beaufortLabel(kt) {
        if (kt < 4)  return 'Aragem';
        if (kt < 7)  return 'Brisa suave';
        if (kt < 11) return 'Brisa leve';
        if (kt < 17) return 'Brisa moderada';
        if (kt < 22) return 'Brisa fresca';
        if (kt < 28) return 'Brisa forte';
        return 'Vento forte';
    }
    function windQuality(kt) {
        if (kt < 4)  return { label:'FRACO',  color:'#9b7dd4' };
        if (kt < 10) return { label:'LEVE',   color:'#3db87a' };
        if (kt < 18) return { label:'IDEAL',  color:'#3db87a' };
        if (kt < 25) return { label:'FORTE',  color:'#e87a45' };
        return             { label:'PESADO', color:'#c84b38' };
    }

    async function getGPSCoords() {
        return new Promise(resolve => {
            if (!navigator.geolocation) {
                resolve({ lat:-23.55, lon:-46.63, name:'São Paulo' }); return;
            }
            navigator.geolocation.getCurrentPosition(
                async pos => {
                    const lat = pos.coords.latitude, lon = pos.coords.longitude;
                    let name = 'Sua localização';
                    try {
                        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
                        const j = await r.json();
                        name = j.address?.city || j.address?.town || j.address?.village || j.address?.suburb || name;
                    } catch {}
                    resolve({ lat, lon, name });
                },
                () => {
                    const p = getWindPinned();
                    resolve(p ? { lat:p.lat, lon:p.lon, name:p.name } : { lat:-23.55, lon:-46.63, name:'São Paulo' });
                },
                { timeout:8000, maximumAge:300000 }
            );
        });
    }

    function useWindData() {
        const [state, setState] = React.useState({ loading:true, data:null, locationName:'', error:null });
        React.useEffect(() => {
            let cancelled = false;
            (async () => {
                const cache = getWindCache();
                if (cache && Date.now() - cache.ts < 3600000) {
                    if (!cancelled) setState({ loading:false, data:cache.data, locationName:cache.locationName, error:null });
                    return;
                }
                try {
                    const pinned = getWindPinned();
                    const { lat, lon, name } = pinned ? { lat:pinned.lat, lon:pinned.lon, name:pinned.name } : await getGPSCoords();
                    const res = await fetch(
                        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
                        `&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m` +
                        `&wind_speed_unit=kn&timezone=auto&forecast_days=4` +
                        `&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m`
                    );
                    const json = await res.json();
                    saveWindCache({ data:json, locationName:name, ts:Date.now() });
                    if (!cancelled) setState({ loading:false, data:json, locationName:name, error:null });
                } catch(e) {
                    if (!cancelled) setState({ loading:false, data:null, locationName:'', error:e.message });
                }
            })();
            return () => { cancelled = true; };
        }, []);
        return state;
    }

    function WindCard() {
        const { loading, data, locationName, error } = useWindData();
        if (loading) return (
            <div className="card" style={{padding:'16px 18px', background:'var(--card-navy)', minHeight:72, display:'flex', alignItems:'center'}}>
                <div className="card-label" style={{color:'rgba(245,240,232,0.3)'}}>VENTO · CARREGANDO…</div>
            </div>
        );
        if (error || !data || !data.current) return null;

        const c    = data.current;
        const spd  = Math.round(c.wind_speed_10m);
        const dir  = c.wind_direction_10m;
        const gust = Math.round(c.wind_gusts_10m);
        const qual = windQuality(spd);

        // Next 6 hours starting from now
        const nowIso = new Date().toISOString().slice(0,13);
        const startIdx = data.hourly.time.findIndex(t => t.startsWith(nowIso));
        const base = startIdx >= 0 ? startIdx : 0;
        const next6 = Array.from({length:6}, (_,i) => {
            const idx = base + i;
            if (idx >= data.hourly.time.length) return null;
            return {
                h:   new Date(data.hourly.time[idx]).getHours() + 'h',
                spd: Math.round(data.hourly.wind_speed_10m[idx]),
                dir: data.hourly.wind_direction_10m[idx],
            };
        }).filter(Boolean);

        return (
            <div className="card" style={{padding:'16px 18px', background:'var(--card-navy)'}}>
                <div style={{width:'100%'}}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
                        <div className="card-label" style={{color:'rgba(245,240,232,0.4)'}}>VENTO · {locationName.toUpperCase()}</div>
                        <span style={{fontSize:9, fontWeight:700, letterSpacing:'0.5px', padding:'3px 8px', borderRadius:4, background:qual.color+'22', color:qual.color}}>{qual.label}</span>
                    </div>
                    <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:2}}>
                        <span style={{fontFamily:'var(--font-display)', fontSize:36, fontWeight:700, color:'var(--text-cream)', lineHeight:1}}>{spd}</span>
                        <span style={{fontSize:14, color:'rgba(245,240,232,0.5)'}}>kt</span>
                        <WindArrow deg={dir}/>
                        <span style={{fontSize:13, color:'rgba(245,240,232,0.7)'}}>{degToCompass(dir)}</span>
                        <span style={{fontSize:11, color:'rgba(245,240,232,0.35)', marginLeft:4}}>raj {gust}kt</span>
                    </div>
                    <div style={{fontSize:11, color:'rgba(245,240,232,0.35)', marginBottom:14}}>{beaufortLabel(spd)}</div>
                    <div style={{display:'flex', gap:4}}>
                        {next6.map((h,i) => (

    function EvolucaoChart({ onClick }) {
        const hist = getAvaliacaoHistory().filter(h => h.scores);
        if (hist.length < 2) return null;
        const pillars = [
            { k:'core',       label:'Core',       color:'#9b7dd4' },
            { k:'forca',      label:'Força',      color:'#c84b38' },
            { k:'endurance',  label:'Endurance',  color:'#2d6b4f' },
            { k:'mobilidade', label:'Mobilidade', color:'#4a8fd9' },
        ];
        const W = 160, H = 36, PAD = 4, n = hist.length;
        return (
            <div className="card" style={{padding:'16px 18px', background:'#fff', cursor:'pointer'}} onClick={onClick}>
                <div style={{width:'100%'}}>
                    <div className="card-label" style={{marginBottom:12}}>EVOLUÇÃO · {hist.length} AVALIAÇÕES</div>
                    {pillars.map(p => {
                        const vals = hist.map(h => h.scores[p.k] ?? 0);
                        const pts  = vals.map((v,i) => {
                            const x = PAD + (n > 1 ? (i/(n-1)) : 0.5) * (W - 2*PAD);
                            const y = H - PAD - (v/100) * (H - 2*PAD);
                            return `${x.toFixed(1)},${y.toFixed(1)}`;
                        }).join(' ');
                        const last  = vals[vals.length - 1];
                        const delta = last - vals[0];
                        const [lx, ly] = pts.split(' ').pop().split(',');
                        return (
                            <div key={p.k} style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                                <div style={{width:72,fontSize:10,fontWeight:600,color:'rgba(24,25,31,0.45)',letterSpacing:'0.4px',textTransform:'uppercase',flexShrink:0}}>{p.label}</div>
                                <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{flex:1}}>
                                    <polyline points={pts} fill="none" stroke={p.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity="0.85"/>
                                    <circle cx={lx} cy={ly} r="3.5" fill={p.color}/>
                                </svg>
                                <div style={{width:40,textAlign:'right',flexShrink:0}}>
                                    <span style={{fontSize:13,fontWeight:700,color:'var(--text-dark)'}}>{last}</span>
                                    {delta !== 0 && <span style={{fontSize:9,marginLeft:3,color:delta>0?'#3db87a':'#c84b38'}}>{delta>0?'+':''}{delta}</span>}
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    }

    function getAdaptiveSignal() {
        const hist = getHistory();
        const recent = hist.filter(h => h.rpe).slice(-3);
        if (recent.length < 2) return null;
        const avg = recent.reduce((a, h) => a + h.rpe, 0) / recent.length;
        if (avg >= 7.5) return { type: 'leve',   avg: Math.round(avg * 10) / 10 };
        if (avg <= 3.5) return { type: 'avanca', avg: Math.round(avg * 10) / 10 };
        return null;
    }

    function TSBChart({ data }) {
        if (!data || data.every(d => d.ctl === 0)) return null;
        if (data.length === 1) return null;

        const W = 300, H = 60;
        const maxLoad  = Math.max(...data.map(d => Math.max(d.ctl, d.atl)), 1);
        const minTSB   = Math.min(...data.map(d => d.tsb), -1);
        const maxTSB   = Math.max(...data.map(d => d.tsb), 1);
        const tsbRange = Math.max(maxTSB - minTSB, 1);

        function toX(i)     { return Math.round((i / (data.length - 1)) * W); }
        function toYLoad(v) { return Math.round(H * 0.6 * (1 - v / maxLoad)); }
        function toYTSB(v)  { return Math.round(H * 0.6 + H * 0.4 * (1 - (v - minTSB) / tsbRange)); }

        const ctlPath = data.map((d, i) => `${i === 0 ? 'M' : 'L'}${toX(i)},${toYLoad(d.ctl)}`).join(' ');
        const atlPath = data.map((d, i) => `${i === 0 ? 'M' : 'L'}${toX(i)},${toYLoad(d.atl)}`).join(' ');
        const tsbPath = data.map((d, i) => `${i === 0 ? 'M' : 'L'}${toX(i)},${toYTSB(d.tsb)}`).join(' ');

        return (

    function TelaPulso() {
        const [period, setPeriod] = useState('7d');
        const periodDays = { '7d': 7, '30d': 30, '90d': 90 }[period] || 7;

        const metrics = React.useMemo(() => {
            const loads = getDailyLoads();
            function makeMetric(field, name, color, avgDays, unit, invert) {
                const series   = getMetricSeries(field, periodDays);
                const latest   = series.length ? series[series.length - 1][field] : null;
                const baseline = getMetricBaseline(field, avgDays);
                const delta    = (latest && baseline) ? Math.round((latest / baseline - 1) * 100) : null;
                const deltaPos = delta !== null && (invert ? delta <= 0 : delta >= 0);
                return { name, color, latest, baseline: baseline ? Math.round(baseline * 10) / 10 : null, delta, deltaPos, unit, series: series.map(e => e[field] || 0) };
            }
            const today = new Date();
            const cargaSeries = Array.from({ length: periodDays }, (_, i) => {
                const d = new Date(today);
                d.setDate(today.getDate() - (periodDays - 1 - i));
                return loads[d.toLocaleDateString('sv')] || 0;
            });
            const cargaPositive = cargaSeries.filter(v => v > 0);
            const cargaLatest   = cargaSeries[cargaSeries.length - 1] || null;
            const cargaAvg      = cargaPositive.length ? cargaPositive.reduce((a, b) => a + b, 0) / cargaPositive.length : null;
            const cargaDelta    = cargaLatest && cargaAvg ? Math.round((cargaLatest / cargaAvg - 1) * 100) : null;
            return [
                makeMetric('hrv',       'HRV',        '#4a8fd9', 28, 'ms',  false),
                makeMetric('fcRepouso', 'FC REPOUSO', '#3db87a', 28, 'bpm', true),
                makeMetric('sono',      'SONO',       '#9b7dd4', 7,  'h',   false),
                { name:'CARGA', color:'#e87a45', latest: cargaLatest ? Math.round(cargaLatest*10)/10 : null,
                  baseline: cargaAvg ? Math.round(cargaAvg*10)/10 : null, delta: cargaDelta, deltaPos: cargaDelta !== null && cargaDelta >= 0,
                  unit:'UA', series: cargaSeries },
            ];
        }, [period]);

        const tsbData = React.useMemo(() => buildTSBData(periodDays), [period]);

        const readiness   = calcReadiness();
        const readinessPh = !readiness ? 'Faça o check-in diário.'
                          : readiness >= 80 ? 'Dia de atacar.'
                          : readiness >= 65 ? 'Mar calmo.'
                          : readiness >= 50 ? 'Treino moderado.'
                          : 'Escuta o corpo.';

        const latestTSB  = tsbData.length ? tsbData[tsbData.length - 1].tsb : 0;
        const formaLabel = latestTSB > 5   ? 'Em ascensão.'
                         : latestTSB < -10  ? 'Acumulando fadiga.'
                         :                    'Estável.';
        const formaColor = latestTSB > 5   ? '#3db87a'
                         : latestTSB < -10  ? '#e87a45'
                         :                    'rgba(245,240,232,0.6)';
        const noTSBData  = tsbData.every(d => d.ctl === 0);

        return (
            <div>
                <div className="page-header pad">
                    <div className="overline" style={{marginBottom:6}}>{new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'}).toUpperCase()}</div>
                    <div className="page-title">Pulso</div>
                    <div className="readiness-big-card">
                        <ReadinessCircle score={readiness || 0} size={90}/>
                        <div className="readiness-detail">
                            <div className="card-label">READINESS</div>
                            <div className="readiness-hl">{readinessPh}</div>
                            {!readiness && <div style={{fontSize:11,color:'rgba(245,240,232,0.4)',marginTop:4}}>Faça o check-in para ver seu score.</div>}
                        </div>
                    </div>
                    <div className="period-bar">
                        {['7d','30d','90d'].map(p => (
                            <button key={p} className={`period-btn ${period===p?'on':'off'}`} onClick={() => setPeriod(p)}>{p}</button>
                        ))}
                    </div>
                    <div className="metrics-grid">
                        {metrics.map((m, i) => (
                            <div key={i} className="metric-card">
                                <div className="metric-hdr">
                                    <span className="metric-name-txt">{m.name}</span>
                                </div>
                                {m.latest !== null ? (
                                    <React.Fragment>
                                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:6}}>
                                            <div>
                                                <span className="metric-val">{m.latest}</span>
                                                <span className="metric-unit"> {m.unit}</span>
                                                <div style={{fontSize:8,color:'rgba(245,240,232,0.35)',marginTop:1}}>HOJE</div>
                                            </div>
                                            {m.baseline !== null && (
                                                <div style={{textAlign:'right'}}>
                                                    <span style={{fontSize:15,fontWeight:600,color:m.color,fontFamily:'var(--font-display)'}}>{m.baseline}</span>
                                                    <span style={{fontSize:9,color:'rgba(245,240,232,0.4)'}}> {m.unit}</span>
                                                    <div style={{fontSize:8,color:'rgba(245,240,232,0.35)',marginTop:1}}>MÉD {m.name==='SONO'?'7D':'28D'}</div>
                                                </div>
                                            )}
                                        </div>
                                        {m.delta !== null && (
                                            <div style={{display:'inline-block',background:m.deltaPos?'rgba(61,184,122,0.12)':'rgba(232,122,69,0.12)',border:`1px solid ${m.deltaPos?'rgba(61,184,122,0.3)':'rgba(232,122,69,0.3)'}`,borderRadius:20,padding:'2px 8px',fontSize:9,fontWeight:700,color:m.deltaPos?'#3db87a':'#e87a45',marginBottom:8}}>
                                                {m.deltaPos?'▲':'▼'} {Math.abs(m.delta)}%
                                            </div>
                                        )}
                                        <div className="sparkline-wrap">
                                            <Sparkline data={m.series} color={m.color} avgLine={m.baseline}/>

    function TelaSessionAtiva({ session, onClose }) {
        const sections = React.useMemo(() => {
            if (!session) return [];
            return getSessionSections(session.day.type, getAvaliacao(), session.day.cardioMode || getCardioMode());
        }, [session]);

        const allExercises = React.useMemo(() =>
            sections.flatMap((sec, si) =>
                sec.items.map((item, ii) => {
                    const id = `s${si}-i${ii}`;
                    return { id, section:sec.title, color:sec.color, ...item, ...((swapped||{})[id]||{}) };
                })
            ), [sections, swapped]);

        const today = new Date().toLocaleDateString('sv');

        const [doneIds,   setDoneIds]   = React.useState(() => { const s=getSessionState(); return (s&&!s.completed)?(s.doneIds||[]): []; });
        const [elapsed,   setElapsed]   = React.useState(() => { const s=getSessionState(); return (s&&s.startedAt)?Math.floor((Date.now()-s.startedAt)/1000):0; });

        const [showRPE,    setShowRPE]    = React.useState(false);
        const [rpeScore,   setRpeScore]   = React.useState(0);
        const [rpeNote,    setRpeNote]    = React.useState('');
        const [swapTarget, setSwapTarget] = React.useState(null);
        const [swapped,    setSwapped]    = React.useState({});
        const [results,    setResults]    = React.useState(() => { const s=getSessionState(); return (s&&s.results)||{}; });
        const [showShare,  setShowShare]  = React.useState(false);
        const [shareData,  setShareData]  = React.useState(null);
        const globalRef    = React.useRef(null);
        const startedAtRef = React.useRef(null);
        const totalMsRef   = React.useRef(0);
        const canvasRef    = React.useRef(null);
        if (startedAtRef.current === null) {
            const s = getSessionState();
            startedAtRef.current = (s && s.startedAt) ? s.startedAt : Date.now();
        }

        React.useEffect(() => {
            saveSessionState({ date:today, weekIdx:session?.weekIdx||1, dayType:session?.day.type||'', doneIds, startedAt:startedAtRef.current, completed:false });
            globalRef.current = setInterval(() => setElapsed(Math.floor((Date.now()-startedAtRef.current)/1000)), 1000);
            let wl = null;
            navigator.wakeLock?.request('screen').then(l => { wl = l; }).catch(() => {});
            return () => { clearInterval(globalRef.current); wl?.release(); };
        }, []);

        function fmtTime(secs) {
            const m = Math.floor(secs/60), s = secs%60;
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        const currentEx = allExercises.find(ex => !doneIds.includes(ex.id));
        const nextEx    = currentEx ? allExercises.find(ex => !doneIds.includes(ex.id) && ex.id !== currentEx.id) : null;
        const allDone   = allExercises.length === 0 || doneIds.length >= allExercises.length;

        function concluirExercicio() {
            if (!currentEx) return;
            const newDone = [...doneIds, currentEx.id];
            setDoneIds(newDone);
            saveSessionState({ doneIds: newDone, results });
        }

        function encerrarSessao() {
            clearInterval(globalRef.current);
            totalMsRef.current = Date.now() - startedAtRef.current;
            setShowRPE(true);
        }

        function confirmarRPE() {
            const totalMs = totalMsRef.current;
            saveSessionState({ completed:true, totalMs, doneIds });
            updateStreak();
            const isMinimo = session?.day.type === 'ativo' || totalMs < 15 * 60 * 1000;
            saveToHistory({
                date: new Date().toLocaleDateString('sv'),
                weekIdx: session?.weekIdx || 1,
                dayType: session?.day.type || '',
                sessionName: session?.day.name || '',
                totalMs, isMinimo,
                rpe: rpeScore || null,
                note: rpeNote.trim() || '',
                results,
            });
            const streak = getStreak();
            setShareData({ sessionName: session?.day.name || 'Sessão', totalMs, doneCount: doneIds.length, rpe: rpeScore || null, streakCount: streak.count });
            setShowRPE(false);
            setShowShare(true);
        }

        React.useEffect(() => {
            if (!showShare || !canvasRef.current || !shareData) return;
            const cvs = canvasRef.current;
            const ctx = cvs.getContext('2d');
            const W = cvs.width, H = cvs.height;
            function wt(text, x, y, maxW, lineH) {
                const words = text.split(' '), lines = [];
                let line = '';
                for (const w of words) { const t = line ? line+' '+w : w; if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = w; } else line = t; }
                lines.push(line);
                lines.forEach((l, i) => ctx.fillText(l, x, y + (i - (lines.length-1)/2) * lineH));
            }
            ctx.fillStyle = '#090f1e'; ctx.fillRect(0,0,W,H);
            const grad = ctx.createLinearGradient(0,0,0,H*0.4);
            grad.addColorStop(0,'rgba(232,122,69,0.15)'); grad.addColorStop(1,'rgba(9,15,30,0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,W,H*0.4);
            ctx.fillStyle = '#e87a45'; ctx.fillRect(0,0,W,8);
            ctx.textAlign = 'center';
            ctx.font = `bold ${W*0.044}px system-ui,-apple-system,sans-serif`;
            ctx.fillStyle = '#e87a45'; ctx.fillText("WE DON'T STOP", W/2, H*0.1);
            ctx.font = `${W*0.18}px sans-serif`; ctx.fillStyle = '#3db87a'; ctx.fillText('✓', W/2, H*0.27);
            ctx.font = `bold ${W*0.072}px system-ui,-apple-system,sans-serif`;
            ctx.fillStyle = '#f5f0e8'; wt(shareData.sessionName, W/2, H*0.38, W*0.85, W*0.082);
            const mins = Math.floor(shareData.totalMs/60000);
            ctx.font = `${W*0.038}px system-ui`; ctx.fillStyle = 'rgba(245,240,232,0.5)';
            ctx.fillText(`${mins} min · ${shareData.doneCount} exercícios`, W/2, H*0.47);
            ctx.strokeStyle = 'rgba(245,240,232,0.1)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(W*0.15,H*0.52); ctx.lineTo(W*0.85,H*0.52); ctx.stroke();
            if (shareData.rpe) {
                const rc = shareData.rpe<=3?'#3db87a':shareData.rpe<=6?'#f0c52e':shareData.rpe<=8?'#e87a45':'#c84b38';
                ctx.font = `bold ${W*0.15}px system-ui`; ctx.fillStyle = rc;
                ctx.fillText(`RPE ${shareData.rpe}`, W/2, H*0.64);
                ctx.font = `${W*0.034}px system-ui`; ctx.fillStyle = 'rgba(245,240,232,0.35)';
                ctx.fillText('de 10', W/2, H*0.685);
            }
            if (shareData.streakCount > 1) {
                ctx.font = `bold ${W*0.048}px system-ui`; ctx.fillStyle = '#f5f0e8';
                ctx.fillText(`🔥 ${shareData.streakCount} dias seguidos`, W/2, H*0.77);
            }
            const d = new Date();
            ctx.font = `${W*0.03}px system-ui`; ctx.fillStyle = 'rgba(245,240,232,0.28)';
            ctx.fillText(d.toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'}), W/2, H*0.85);
            ctx.font = `${W*0.026}px system-ui`; ctx.fillStyle = 'rgba(245,240,232,0.18)';
            ctx.fillText('brunofontesoficial.github.io/we-dont-stop', W/2, H*0.95);
        }, [showShare]);

        async function handleShare() {
            if (!canvasRef.current) return;
            const mins = Math.floor(shareData.totalMs/60000);
            const txt = [`✅ Completei "${shareData.sessionName}" em ${mins}min`, shareData.rpe ? `RPE ${shareData.rpe}/10` : '', shareData.streakCount > 1 ? `🔥 ${shareData.streakCount} dias seguidos` : '', '#wedontStop #treinamento'].filter(Boolean).join(' · ');
            try {
                const blob = await new Promise(r => canvasRef.current.toBlob(r,'image/png'));
                const file = new File([blob], 'sessao-we-dont-stop.png', { type:'image/png' });
                if (navigator.canShare && navigator.canShare({ files:[file] })) {
                    await navigator.share({ files:[file], title:"We Don't Stop", text:txt });
                } else if (navigator.share) {
                    await navigator.share({ title:"We Don't Stop", text:txt, url:'https://brunofontesoficial.github.io/we-dont-stop' });
                } else {
                    await navigator.clipboard.writeText(txt+'\nhttps://brunofontesoficial.github.io/we-dont-stop');
                    alert('Copiado!');
                }
            } catch(e) { if (e.name !== 'AbortError') console.error(e); }
        }

        if (!session) return null;
        const progressPct = allExercises.length > 0 ? (doneIds.length / allExercises.length) * 100 : 0;

        return (
            <div style={{position:'fixed',inset:0,background:'var(--bg)',zIndex:200,display:'flex',flexDirection:'column',overflow:'hidden'}}>
                {/* Topbar */}
                <div style={{padding:'14px 20px 8px',flexShrink:0}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                        <div>
                            <div style={{fontSize:8,fontWeight:700,letterSpacing:'1.5px',color:'rgba(245,240,232,0.38)',marginBottom:2}}>
                                SESSÃO ATIVA · {new Date().toLocaleDateString('pt-BR',{weekday:'short'}).toUpperCase()}
                            </div>
                            <div style={{fontSize:13,fontWeight:700,color:'#f5f0e8'}}>{session.day.name}</div>
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                            <div style={{fontFamily:'var(--font-display)',fontSize:20,fontWeight:700,color:'rgba(245,240,232,0.45)',fontVariantNumeric:'tabular-nums'}}>{fmtTime(elapsed)}</div>
                            <div onClick={onClose} style={{width:28,height:28,borderRadius:'50%',background:'rgba(245,240,232,0.08)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'rgba(245,240,232,0.5)',fontSize:14}}>✕</div>
                        </div>
                    </div>
                    <div style={{background:'rgba(245,240,232,0.08)',borderRadius:4,height:3}}>
                        <div style={{height:3,borderRadius:4,background:'#3db87a',width:`${progressPct}%`,transition:'width 0.4s'}}/>
                    </div>
                </div>

                {/* Content */}
                <div style={{flex:1,overflowY:'auto',padding:'0 20px',WebkitOverflowScrolling:'touch'}}>
                    {allDone ? (
                        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'80%',textAlign:'center'}}>
                            <div style={{fontSize:52,marginBottom:14}}>🎯</div>
                            <div style={{fontFamily:'var(--font-display)',fontSize:32,fontWeight:600,color:'#3db87a',marginBottom:8}}>Sessão completa!</div>
                            <div style={{fontSize:14,color:'rgba(245,240,232,0.45)'}}>Duração total: {fmtTime(elapsed)}</div>
                        </div>
                    ) : (
                        /* ── EXERCISE PHASE ── */
                        <>
                            {currentEx && (
                                <div style={{marginBottom:12,marginTop:4}}>
                                    {/* Focus card */}
                                    <div style={{background:`${currentEx.color}10`,border:`1.5px solid ${currentEx.color}35`,borderRadius:18,padding:'22px 20px',marginBottom:10}}>
                                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                                            <div style={{fontSize:9,fontWeight:700,letterSpacing:1.5,color:currentEx.color,textTransform:'uppercase'}}>{currentEx.section}</div>
                                            <button onClick={() => setSwapTarget(currentEx)}
                                                style={{fontSize:10,fontWeight:600,color:'rgba(245,240,232,0.4)',background:'rgba(245,240,232,0.07)',border:'none',borderRadius:20,padding:'4px 10px',cursor:'pointer',letterSpacing:'0.5px'}}>
                                                ↔ TROCAR
                                            </button>
                                        </div>
                                        <div style={{fontFamily:'var(--font-display)',fontSize:26,fontWeight:600,color:'#f5f0e8',marginBottom:4,lineHeight:1.2}}>{currentEx.name}</div>
                                        <div style={{fontSize:13,color:'rgba(245,240,232,0.48)',marginBottom: getTip(currentEx.name) ? 6 : 16}}>{currentEx.detail}</div>

    function TelaModuRegata({ onClose }) {
        const TAPER_DAYS = 8;
        const nextEvent = getNextEvent();
        const daysLeft = nextEvent ? getRaceDaysLeft(nextEvent.date) : null;

        // Build taper bar data from race date
        const bars = React.useMemo(() => {
            const today = new Date(); today.setHours(0,0,0,0);
            return Array.from({length: TAPER_DAYS}, (_, i) => {
                const daysBeforeRace = TAPER_DAYS - 1 - i; // 7..0
                const pct = 0.20 + 0.70 * (daysBeforeRace / (TAPER_DAYS - 1));
                let barDay = '';
                let isToday = false;
                if (nextEvent) {
                    const raceDt = new Date(nextEvent.date + 'T00:00:00');
                    const barDt = new Date(raceDt);
                    barDt.setDate(raceDt.getDate() - daysBeforeRace);
                    barDay = String(barDt.getDate());
                    isToday = barDt.getTime() === today.getTime();
                } else {
                    const barDt = new Date(today);
                    barDt.setDate(today.getDate() + i);
                    barDay = String(barDt.getDate());
                    isToday = i === 0;
                }
                return { day: barDay, pct, today: isToday, daysBeforeRace };
            });
        }, [nextEvent && nextEvent.date]);

        function barClass(b) {
            if (b.today) return 'taper-bar-today';
            if (daysLeft === null || daysLeft > 7) return 'taper-bar-taper';
            if (daysLeft < 0) return 'taper-bar-base';
            return b.daysBeforeRace > daysLeft ? 'taper-bar-base' : 'taper-bar-taper';
        }

        // Event display
        let raceName = 'SEM EVENTO PRÓXIMO';
        let dateLabel = '–';
        if (nextEvent) {
            const parts = [nextEvent.name, nextEvent.location].filter(Boolean);
            raceName = parts.join(' · ').toUpperCase();
            const dt = new Date(nextEvent.date + 'T00:00:00');
            const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
            dateLabel = `${dt.getDate()} ${meses[dt.getMonth()]}`;
        }

        // Session recommendation based on daysLeft
        function getSessionInfo() {
            if (daysLeft === null || daysLeft > TAPER_DAYS) {
                const txt = daysLeft !== null ? `Taper começa em ${daysLeft - TAPER_DAYS + 1} dias.` : 'Adicione um evento no calendário para ativar o taper.';
                return { title: 'Treino Normal', note: txt, badge: null, reduction: null };
            }
            if (daysLeft === 0) return { title: 'Dia de Regata', note: 'Foco total. Aquecimento leve + hidratação.', badge: 'REGATA', reduction: null };
            if (daysLeft < 0) return { title: 'Pós-Regata', note: 'Recuperação ativa. Mobilidade e descanso.', badge: null, reduction: null };
            const pctCut = Math.round((1 - (0.20 + 0.70 * (daysLeft / (TAPER_DAYS - 1)))) * 100);
            if (daysLeft >= 5) return { title: 'Força & Core', note: `Reduzi 1 série nos compostos. Core mantém. Mobilidade +5min.`, badge: 'TAPER', reduction: pctCut };
            if (daysLeft >= 2) return { title: 'Ativação Neuromuscular', note: 'Séries curtas, alta velocidade. Sem falha muscular.', badge: 'TAPER', reduction: pctCut };
            return { title: 'Descanso Ativo', note: 'Mobilidade 20min. Nada mais. Preserva energia para amanhã.', badge: 'TAPER', reduction: null };
        }
        const sessionInfo = getSessionInfo();

        // Pre-race checklist (auto-checked based on proximity)
        const checklist = (daysLeft !== null && daysLeft >= 0 && daysLeft <= 14) ? [
            { txt: 'Verificar equipamento e vela',    done: daysLeft <= 10 },
            { txt: 'Hidratação — 3L/dia',             done: daysLeft <= 7  },
            { txt: 'Logística e transporte',          done: daysLeft <= 4  },
            { txt: 'Descanso — dormir 8h por noite',  done: false          },
        ] : [];

        // Taper description
        let taperDesc = 'Prévia do taper automático nos últimos 8 dias.';
        if (daysLeft !== null && daysLeft >= 0 && daysLeft <= 7) {
            const pctCut = Math.round((1 - (0.20 + 0.70 * (daysLeft / (TAPER_DAYS - 1)))) * 100);
            taperDesc = `Volume reduz ${pctCut}% até a regata.`;
        } else if (daysLeft !== null && daysLeft < 0) {
            taperDesc = 'Ciclo de taper concluído.';
        }

        const { data: windData, locationName: windLocation, loading: windLoading } = useWindData();
        const wind = React.useMemo(() => {
            if (!windData?.hourly) return [];
            const times = windData.hourly.time;
            const byDay = {};
            times.forEach((t, i) => {
                const d = new Date(t);
                const key = d.toLocaleDateString('sv'); // YYYY-MM-DD
                if (!byDay[key]) byDay[key] = [];
                byDay[key].push({
                    h:    d.getHours(),
                    spd:  Math.round(windData.hourly.wind_speed_10m[i]),
                    dir:  windData.hourly.wind_direction_10m[i],
                    gust: Math.round(windData.hourly.wind_gusts_10m[i]),
                });
            });
            const DAYS_PT = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
            return Object.entries(byDay).slice(0, 4).map(([dateStr, hrs]) => {
                const rep = hrs.find(h => h.h === 14) || hrs[Math.floor(hrs.length / 2)];
                const d = new Date(dateStr + 'T12:00:00');
                const qual = windQuality(rep.spd);
                return {
                    dow: DAYS_PT[d.getDay()],
                    dd:  String(d.getDate()),
                    dir: degToCompass(rep.dir),
                    dirDeg: rep.dir,
                    kt:  rep.spd,

            });

                </div>
                <div className="wind-section">
                    <div className="wind-header">
                        <div className="wind-label">PREVISÃO · {windLocation ? windLocation.toUpperCase() : 'OPEN-METEO'}</div>
                        <div className="wind-updated">{windLoading ? 'carregando…' : wind.length ? 'ao vivo' : 'sem dados'}</div>

                    {wind.map((w,i) => (

                        </div>
                    ))}
                    <div style={{marginTop:20,marginBottom:10,fontSize:9,fontWeight:600,letterSpacing:1.6,textTransform:'uppercase',color:'var(--muted-dark)'}}>
                        SESSÃO DE HOJE · AJUSTADA
                    </div>
                    <div style={{background:'var(--card-navy)',borderRadius:16,padding:'16px 18px',marginBottom:20}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                            <div style={{fontFamily:'var(--font-display)',fontSize:26,fontStyle:'italic',fontWeight:500,color:'var(--text-cream)'}}>{sessionInfo.title}</div>
                            {sessionInfo.badge && <div style={{background:'var(--card-coral)',color:'#fff',fontSize:9,fontWeight:700,letterSpacing:1,padding:'3px 9px',borderRadius:4,textTransform:'uppercase',flexShrink:0,marginLeft:10}}>{sessionInfo.badge}</div>}
                        </div>
                        {sessionInfo.reduction !== null && <div style={{fontSize:12,color:'rgba(245,240,232,0.5)',marginBottom:10}}>-{sessionInfo.reduction}% volume</div>}
                        <div style={{fontSize:12,color:'rgba(245,240,232,0.65)',lineHeight:1.5}}>{sessionInfo.note}</div>
                    </div>
                    {checklist.length > 0 && <div>
                        <div style={{marginBottom:10,fontSize:9,fontWeight:600,letterSpacing:1.6,textTransform:'uppercase',color:'var(--muted-dark)'}}>
                            PRÉ-REGATA · {daysLeft} {daysLeft === 1 ? 'DIA' : 'DIAS'}
                        </div>

                                    background:item.done?'var(--card-coral)':'transparent',

                                </div>
                                <div style={{fontSize:13,color:item.done?'rgba(245,240,232,0.35)':'rgba(245,240,232,0.8)',
                                    textDecoration:item.done?'line-through':'none'}}>{item.txt}</div>

        );
