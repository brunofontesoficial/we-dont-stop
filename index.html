<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>We Don't Stop</title>
    <link rel="manifest" href="/we-dont-stop/manifest.json">
    <meta name="theme-color" content="#e87a45">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="We Don't Stop">
    <link rel="apple-touch-icon" href="/we-dont-stop/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg: #090f1e;
            --card-cream: #ede9e1;
            --card-yellow: #f0c52e;
            --card-coral: #c84b38;
            --card-navy: #141e32;
            --text-dark: #18191f;
            --text-cream: #f5f0e8;
            --muted-dark: #6b6b77;
            --muted-light: #5a5a66;
            --green: #3db87a;
            --blue: #4a8fd9;
            --purple: #9b7dd4;
            --orange: #e87a45;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
            --navy-texture: repeating-linear-gradient(45deg, rgba(255,255,255,0.028) 0px, rgba(255,255,255,0.028) 1px, transparent 1px, transparent 7px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body, #root { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: var(--font-body); background: var(--card-cream); color: var(--text-dark); }

        .app { width: 100%; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 88px; -webkit-overflow-scrolling: touch; }
        .screen::-webkit-scrollbar { display: none; }
        .pad { padding-left: 18px; padding-right: 18px; }

        /* ── Typography helpers ── */
        .overline { font-family: var(--font-body); font-size: 10px; font-weight: 500; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted-dark); }
        .page-title { font-family: var(--font-display); font-size: 54px; font-weight: 500; color: var(--text-dark); margin-bottom: 8px; }
        .card-label { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-light); margin-bottom: 4px; }
        .card-title-serif { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--text-dark); line-height: 1.1; margin-bottom: 3px; }
        .card-sub { font-size: 12px; line-height: 1.35; color: var(--muted-light); }
        .chevron { color: var(--muted-light); font-size: 18px; font-weight: 300; flex-shrink: 0; }

        /* ── HOJE ── */
        .hoje-header { padding: 56px 20px 18px; }
        .hoje-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .hoje-name { font-family: var(--font-display); font-size: 46px; font-weight: 500; line-height: 1; color: var(--text-dark); }
        .hoje-mood { font-family: var(--font-display); font-size: 30px; font-weight: 400; font-style: italic; color: var(--muted-dark); line-height: 1; }
        .top-actions { display: flex; align-items: center; gap: 10px; padding-top: 4px; flex-shrink: 0; }
        .bell { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.5; border: 1.5px solid rgba(24,25,31,0.18); border-radius: 50%; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--card-navy); border: 1px solid rgba(245,240,232,0.15); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--text-cream); cursor: pointer; }

        /* ── Cards Stack ── */
        .cards-stack { display: flex; flex-direction: column; gap: 10px; padding: 4px 16px 28px; }
        .card { border-radius: 20px; overflow: hidden; cursor: pointer; transition: transform 0.18s ease, opacity 0.18s ease; }
        .card:active { transform: scale(0.975); opacity: 0.9; }

        .card-readiness { background: #ffffff; padding: 18px 16px 18px 18px; display: flex; align-items: center; gap: 14px; }
        .readiness-body { flex: 1; min-width: 0; }

        .card-avaliacao { background: var(--card-yellow); padding: 18px; display: flex; align-items: center; gap: 14px; }
        .card-avaliacao .card-label { color: rgba(24,25,31,0.5); }
        .card-avaliacao .card-title-serif { color: var(--text-dark); }
        .card-avaliacao .card-sub { color: rgba(24,25,31,0.55); }
        .card-avaliacao .chevron { color: rgba(24,25,31,0.35); }

        .icon-box { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icon-box-yellow { background: rgba(24,25,31,0.12); }
        .icon-box-coral  { background: rgba(245,240,232,0.15); }

        .card-regata { background: var(--card-coral); padding: 18px; display: flex; align-items: center; gap: 14px; }
        .card-regata .card-label { color: rgba(245,240,232,0.6); }
        .card-regata .card-title-serif { color: var(--text-cream); }
        .card-regata .card-sub { color: rgba(245,240,232,0.65); }
        .card-regata .chevron { color: rgba(245,240,232,0.4); }

        .card-streak { background: var(--card-navy); padding: 12px 18px 14px; }
        .streak-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .streak-num-row { display: flex; align-items: baseline; gap: 8px; }
        .streak-num { font-family: var(--font-display); font-size: 48px; font-weight: 600; line-height: 1; color: var(--text-cream); }
        .streak-dias { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(245,240,232,0.45); padding-bottom: 8px; }
        .streak-motto { font-family: var(--font-display); font-size: 15px; font-style: italic; font-weight: 400; color: rgba(245,240,232,0.6); margin-bottom: 12px; }
        .dots-row { display: flex; gap: 5px; align-items: center; }
        .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .timeline-labels { display: flex; justify-content: space-between; margin-top: 5px; }
        .timeline-lbl { font-size: 9px; color: rgba(245,240,232,0.35); }

        .card-sessao { background: var(--card-navy); padding: 16px 18px 18px; }
        .sessao-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .badge-hoje { background: var(--orange); color: #fff; font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 3px 9px; border-radius: 4px; text-transform: uppercase; }
        .sessao-title { font-family: var(--font-display); font-size: 38px; font-weight: 500; line-height: 1.05; color: var(--text-cream); }

        /* ── Iniciar Sessão sticky ── */
        .iniciar-sessao-bar { background: var(--card-coral); padding: 13px 18px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .iniciar-sessao-txt { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: #fff; }

        /* ── 5 Pilares ── */
        .section-block { padding: 20px 16px 4px; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
        .section-title-serif { font-family: var(--font-display); font-size: 28px; font-weight: 500; color: var(--text-dark); line-height: 1; }
        .section-link { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; color: var(--muted-dark); text-transform: uppercase; }
        .pilares-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 16px 16px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .pilares-scroll::-webkit-scrollbar { display: none; }
        .pilar-card { background: #fff; border-radius: 16px; padding: 14px; min-width: 100px; flex-shrink: 0; }
        .pilar-num { font-family: var(--font-display); font-size: 32px; font-weight: 600; color: var(--text-dark); line-height: 1; margin: 8px 0 2px; }
        .pilar-name { font-size: 11px; font-weight: 500; color: var(--muted-dark); margin-bottom: 8px; }
        .pilar-bar { height: 3px; border-radius: 2px; }

        /* ── Carga card ── */
        .card-carga { background: #fff; padding: 18px; display: flex; align-items: center; gap: 16px; }
        .carga-info { flex: 1; }
        .carga-title { font-family: var(--font-display); font-size: 20px; font-weight: 500; color: var(--text-dark); margin-bottom: 4px; }
        .carga-sub { font-size: 11px; color: var(--muted-dark); }

        /* ── Condições ── */
        .card-condicoes { background: var(--card-navy); padding: 16px 18px; border-radius: 20px; margin: 0 16px 10px; }
        .cond-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .cond-title { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(245,240,232,0.45); }
        .cond-time { font-size: 9px; font-weight: 600; letter-spacing: 1px; color: rgba(245,240,232,0.35); text-transform: uppercase; }
        .cond-grid { display: flex; gap: 0; }
        .cond-col { flex: 1; }
        .cond-val { font-family: var(--font-display); font-size: 28px; font-weight: 500; color: var(--text-cream); line-height: 1; }
        .cond-unit { font-size: 13px; font-weight: 400; color: rgba(245,240,232,0.6); margin-left: 2px; }
        .cond-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(245,240,232,0.4); margin-top: 2px; }
        .cond-sub { font-size: 11px; color: rgba(245,240,232,0.4); margin-top: 1px; }

        /* ── Mensagem ── */
        .msg-card { background: rgba(200,75,56,0.08); border-radius: 16px; padding: 14px 16px; margin: 0 16px 28px; }
        .msg-row { display: flex; align-items: flex-start; gap: 12px; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--card-coral); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .msg-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
        .msg-time { font-size: 11px; color: var(--muted-dark); margin-left: 6px; }
        .msg-text { font-size: 13px; color: var(--text-dark); line-height: 1.5; margin-top: 6px; font-style: italic; }

        /* ── Bottom Nav ── */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 82px; background: var(--card-cream); border-top: 1px solid rgba(24,25,31,0.08); display: flex; align-items: flex-start; padding-top: 10px; z-index: 100; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 0 2px; opacity: 0.38; transition: opacity 0.2s; }
        .nav-tab.active { opacity: 1; }
        .nav-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; color: var(--text-dark); }
        .nav-lbl { font-size: 8.5px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text-dark); }

        /* ── Overlay base ── */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 100px; }
        .overlay::-webkit-scrollbar { display: none; }
        .overlay-topbar { display: flex; align-items: center; justify-content: center; padding: 22px 20px 14px; position: relative; }
        .overlay-close { position: absolute; left: 20px; width: 32px; height: 32px; border-radius: 50%; background: var(--card-navy); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .overlay-title-lbl { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted-dark); }

        /* ── Testes ── */
        .page-header { padding: 56px 20px 16px; }
        .page-desc { font-size: 13px; color: var(--muted-dark); line-height: 1.55; margin-bottom: 18px; }
        .quote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .quote-card { background: var(--card-navy); border-radius: 16px; padding: 16px; }
        .quote-card-t { font-family: var(--font-display); font-size: 16px; font-weight: 600; font-style: italic; color: var(--text-cream); margin-bottom: 5px; }
        .quote-card-s { font-size: 11px; color: var(--muted-dark); line-height: 1.4; }
        .level-card { background: var(--card-yellow); border-radius: 18px; padding: 20px; margin-bottom: 12px; }
        .level-overline { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(24,25,31,0.48); margin-bottom: 4px; }
        .level-title { font-family: var(--font-display); font-size: 58px; font-weight: 700; color: var(--text-dark); line-height: 1; margin-bottom: 5px; }
        .level-sub { font-size: 12px; color: rgba(24,25,31,0.58); margin-bottom: 14px; }
        .bar-bg { height: 5px; background: rgba(24,25,31,0.15); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; }
        .battery-hdr { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .battery-ol { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-dark); margin-bottom: 3px; }
        .battery-count { font-family: var(--font-display); font-size: 28px; font-weight: 500; color: var(--text-dark); line-height: 1; }
        .battery-count span { font-size: 14px; color: var(--muted-dark); margin-left: 4px; }
        .btn-refazer { background: var(--card-navy); color: var(--text-cream); border: none; border-radius: 8px; padding: 9px 14px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; font-family: var(--font-body); text-transform: uppercase; }
        .test-item { background: #ffffff; border-radius: 16px; padding: 16px 18px; margin-bottom: 9px; }
        .test-item-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .test-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; margin-bottom: 6px; }
        .test-name { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text-dark); }
        .test-desc { font-size: 11px; color: var(--muted-light); }
        .test-score { text-align: right; }
        .test-score-num { font-family: var(--font-display); font-size: 34px; font-weight: 600; color: var(--text-dark); line-height: 1; }
        .test-score-u { font-size: 11px; color: var(--muted-light); }
        .tag { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; margin-top: 6px; }
        .tag-avancado { background: rgba(61,184,122,0.15);  color: #3db87a; }
        .tag-solido   { background: rgba(240,197,46,0.2);   color: #b49218; }
        .tag-forte    { background: rgba(20,184,166,0.14);  color: #0f766e; }
        .tag-bom      { background: rgba(74,143,217,0.15);  color: #4a8fd9; }
        .tag-moderado { background: rgba(155,125,212,0.15); color: #9b7dd4; }
        .test-section-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-dark); margin: 14px 0 8px; }

        /* ── Pulso ── */
        .readiness-big-card { background: #ffffff; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; }
        .readiness-detail { flex: 1; }
        .readiness-hl { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text-dark); margin-bottom: 10px; }
        .readiness-rows { display: flex; flex-direction: column; gap: 4px; }
        .readiness-row { display: flex; justify-content: space-between; font-size: 11px; }
        .readiness-key { color: var(--muted-light); }
        .readiness-val { color: var(--text-dark); font-weight: 600; }
        .readiness-delta { color: var(--green); font-weight: 400; margin-left: 4px; }
        .period-bar { display: flex; gap: 8px; margin-bottom: 14px; }
        .period-btn { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; font-family: var(--font-body); transition: all 0.2s; }
        .period-btn.on  { background: var(--text-dark); color: var(--text-cream); }
        .period-btn.off { background: rgba(24,25,31,0.08); color: var(--text-dark); }
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .metric-card { background: #ffffff; border-radius: 16px; padding: 14px; }
        .metric-hdr { display: flex; justify-content: space-between; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .metric-name-txt { color: var(--muted-light); }
        .metric-val { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: var(--text-dark); line-height: 1; }
        .metric-unit { font-size: 11px; color: var(--muted-light); }
        .metric-delta { font-size: 11px; font-weight: 600; margin-bottom: 8px; }
        .d-pos { color: var(--green); } .d-neg { color: var(--orange); }
        .sparkline-wrap { height: 36px; }
        .forma-card { background: var(--card-navy); border-radius: 18px; padding: 20px; margin-bottom: 12px; }
        .forma-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-dark); margin-bottom: 8px; }
        .forma-mood { font-family: var(--font-display); font-size: 28px; font-weight: 400; font-style: italic; color: var(--text-cream); }
        .forma-val { font-family: var(--font-display); font-size: 52px; font-weight: 600; color: var(--text-cream); line-height: 1; text-align: right; }
        .forma-unit { font-size: 13px; color: var(--muted-dark); text-align: right; }

        /* ── Conexões ── */
        .cx-title { font-family: var(--font-display); font-size: 44px; font-weight: 500; color: var(--text-dark); line-height: 1.1; }
        .cx-title-italic { font-family: var(--font-display); font-size: 44px; font-weight: 400; font-style: italic; color: var(--card-coral); line-height: 1.1; margin-bottom: 10px; }
        .cx-desc { font-size: 13px; color: var(--muted-dark); line-height: 1.5; }
        .flow-card { background: var(--card-navy); border-radius: 16px; padding: 16px; margin-bottom: 20px; }
        .flow-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-dark); margin-bottom: 12px; }
        .flow-pills { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .pill { background: rgba(245,240,232,0.12); color: var(--text-cream); font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 20px; }
        .pill-regata { background: var(--card-coral); }
        .flow-arrow { color: var(--muted-dark); font-size: 16px; }
        .flow-desc { font-size: 11px; color: var(--muted-dark); line-height: 1.4; }
        .cx-count { font-size: 9px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted-dark); margin-bottom: 5px; }
        .cx-section-title { font-family: var(--font-display); font-size: 32px; font-weight: 500; color: var(--text-dark); margin-bottom: 10px; }
        .cx-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: #ffffff; border-radius: 18px; margin-bottom: 9px; }
        .cx-icon { width: 64px; height: 64px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .cx-info { flex: 1; min-width: 0; }
        .cx-name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
        .cx-name { font-size: 14px; font-weight: 600; color: var(--text-dark); }
        .cx-online { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
        .cx-data { font-size: 12px; color: var(--muted-dark); }
        .cx-sync { font-size: 10px; color: rgba(24,25,31,0.35); margin-top: 2px; }
        .cx-action { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted-dark); cursor: pointer; border: 1px solid rgba(24,25,31,0.16); border-radius: 20px; padding: 7px 14px; background: transparent; font-family: var(--font-body); flex-shrink: 0; }
        .cx-action-add { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--card-coral); cursor: pointer; border: 1px solid rgba(200,75,56,0.3); border-radius: 20px; padding: 7px 14px; background: transparent; font-family: var(--font-body); flex-shrink: 0; }
        .cx-item-inactive { opacity: 0.55; }

        /* ── Sessão Ativa ── */
        .sessao-screen { min-height: 100vh; background: var(--bg); padding-bottom: 100px; }
        .sessao-nav { display: flex; align-items: center; justify-content: space-between; padding: 24px 20px 12px; }
        .back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .sessao-progress-wrap { height: 4px; background: rgba(245,240,232,0.1); border-radius: 2px; overflow: hidden; margin: 0 20px 18px; }

    const { useState, useMemo, useRef, useEffect } = React;

    /* ── Sparkline ── */
    function Sparkline({ data, color }) {
        const W = 100, H = 36;
        const min = Math.min(...data), max = Math.max(...data);
        const range = (max - min) || 1;
        const pts = data.map((v, i) => {
            const x = (i / (data.length - 1)) * W;
            const y = H - ((v - min) / range) * (H - 6) - 3;
            return `${x},${y}`;
        }).join(' ');
        const area = `0,${H} ${pts} ${W},${H}`;
        const id = `g${color.replace(/[^a-z0-9]/gi,'')}`;
        return (
            <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
                <defs>
                    <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor={color} stopOpacity="0.28"/>
                        <stop offset="100%" stopColor={color} stopOpacity="0"/>
                    </linearGradient>
                </defs>
                <polygon points={area} fill={`url(#${id})`}/>
                <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8"
                    strokeLinejoin="round" strokeLinecap="round"/>
            </svg>
        );
    }

    /* ── Readiness Circle ── */
    function ReadinessCircle({ score, size = 84 }) {
        const r = size / 2 - 6, c = 2 * Math.PI * r;
        const off = c - (score / 100) * c;
        return (
            <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
                <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(24,25,31,0.1)" strokeWidth="5"/>
                <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#3db87a" strokeWidth="5"
                    strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
                    transform={`rotate(-90 ${size/2} ${size/2})`}/>
                <text x={size/2} y={size/2-3} textAnchor="middle" fontSize="22" fontWeight="600"
                    fontFamily="'Cormorant Garamond',serif" fill="#18191f">{score}</text>
                <text x={size/2} y={size/2+12} textAnchor="middle" fontSize="8" fontWeight="600"
                    letterSpacing="1" fontFamily="'DM Sans',sans-serif" fill="#3db87a">VERDE</text>
            </svg>
        );
    }

        {id:'hoje',      label:'HOJE'},

    /* ── Streak Dots ── */
    function StreakDots({ total = 22 }) {
        const hist = getHistory();
        const doneSet = new Set(hist.map(e => e.date));
        const today = new Date().toLocaleDateString('sv');
        const dots = Array.from({length: total}, (_, i) => {
            const daysAgo = total - 1 - i;
            const d = new Date();
            d.setDate(d.getDate() - daysAgo);
            const dateStr = d.toLocaleDateString('sv');
            const isToday = dateStr === today;
            const done = doneSet.has(dateStr);
            return { isToday, done };
        });
        return (
            <div>
                <div className="dots-row">
                    {dots.map(({isToday, done}, i) => (
                        <div key={i} className="dot" style={{
                            width: isToday ? 8 : 6, height: isToday ? 8 : 6,
                            background: done ? '#e87a45' : isToday ? 'rgba(245,240,232,0.5)' : 'rgba(245,240,232,0.15)',
                        }}/>
                    ))}
                </div>
                <div className="timeline-labels">
                    <span className="timeline-lbl">-21d</span>
                    <span className="timeline-lbl">hoje</span>
                </div>
            </div>
        );
    }

    /* ── Activity Heatmap ── */
    function Heatmap({ weeks = 38 }) {
        const data = useMemo(() => {
            const hist = getHistory();
            const doneSet = new Set(hist.map(e => e.date));
            const days = weeks * 7;
            return Array.from({length: days}, (_, i) => {
                const daysAgo = days - 1 - i;
                const d = new Date();
                d.setDate(d.getDate() - daysAgo);
                return doneSet.has(d.toLocaleDateString('sv')) ? 2 : 0;
            });
        }, [weeks]);

        const cols = [];
        for (let w = 0; w < weeks; w++) cols.push(data.slice(w*7,(w+1)*7));

        const color = v => v===0 ? 'rgba(245,240,232,0.08)' : v===1 ? '#f0c52e' : '#c84b38';

        return (
            <div className="heatmap-grid">
                {cols.map((col, wi) => (
                    <div key={wi} className="heat-col">
                        {Array.from({length:7}).map((_,di) => (
                            <div key={di} className="heat-sq" style={{ background: color(col[di] ?? 0) }}/>
                        ))}
                    </div>
                ))}
            </div>
        );
    }

    /* ══════════════════════ SCREENS ══════════════════════ */

    /* ── Session state helpers ── */
    function getSessionState() {
        try {
            const s = JSON.parse(localStorage.getItem('regata_session') || 'null');
            if (!s) return null;
            const today = new Date().toLocaleDateString('sv');
            if (s.date !== today) { clearSessionState(); return null; }
            return s;
        } catch { return null; }
    }
    function saveSessionState(patch) {
        try {
            const cur = JSON.parse(localStorage.getItem('regata_session') || 'null') || {};
            localStorage.setItem('regata_session', JSON.stringify({ ...cur, ...patch }));
        } catch { /* storage unavailable — ignore silently */ }
    }
    function clearSessionState() {
        localStorage.removeItem('regata_session');
    }
    const PROFILE_DEFAULTS = {
        firstName: 'Bruno', lastName: 'Fontes',
        raceName: 'Brasileiro Laser', raceDate: '2026-05-06', raceLocation: 'Ilhabela',
    };
    function getProfile() {
        try {
            const p = JSON.parse(localStorage.getItem('regata_profile') || 'null');
            return p ? { ...PROFILE_DEFAULTS, ...p } : PROFILE_DEFAULTS;
        } catch { return PROFILE_DEFAULTS; }
    }
    function saveProfile(patch) {
        try {
            const cur = getProfile();
            localStorage.setItem('regata_profile', JSON.stringify({ ...cur, ...patch }));
        } catch { /* storage unavailable */ }
    }
    function getCardioMode() {
        try { return localStorage.getItem('regata_cardio_mode') || 'corrida'; } catch { return 'corrida'; }
    }
    function saveCardioMode(mode) {
        try { localStorage.setItem('regata_cardio_mode', mode); } catch {}
    }
    function saveAvaliacao(data) {
        try {
            const entry = { ...data, date: new Date().toLocaleDateString('sv') };
            localStorage.setItem('regata_avaliacao', JSON.stringify(entry));
            const hist = getAvaliacaoHistory();
            const updated = [...hist.filter(e => e.date !== entry.date), entry].slice(-8);
            localStorage.setItem('regata_avaliacao_history', JSON.stringify(updated));
        } catch { /* storage unavailable */ }
    }
    function getAvaliacao() {
        try {
            return JSON.parse(localStorage.getItem('regata_avaliacao') || 'null');
        } catch { return null; }
    }
    function getAvaliacaoHistory() {
        try {
            return JSON.parse(localStorage.getItem('regata_avaliacao_history') || '[]');
        } catch { return []; }
    }
    function getRaceDaysLeft(raceDate) {
        const race = new Date(raceDate + 'T00:00:00');
        const today = new Date(); today.setHours(0,0,0,0);
        return Math.ceil((race - today) / 86400000);
    }
    function getEvents() {
        try {
            const stored = JSON.parse(localStorage.getItem('regata_events') || 'null');
            if (stored) return stored;
            const p = getProfile();
            if (p.raceName && p.raceDate) {
                return [{ id: '0', name: p.raceName, date: p.raceDate, location: p.raceLocation || '' }];
            }
            return [];
        } catch { return []; }
    }
    function saveEvents(evs) {
        try { localStorage.setItem('regata_events', JSON.stringify(evs)); } catch {}
    }
    function getNextEvent() {
        const today = new Date(); today.setHours(0,0,0,0);
        return getEvents()
            .filter(e => new Date(e.date+'T00:00:00') >= today)
            .sort((a,b) => a.date.localeCompare(b.date))[0] || null;
    }
    function getGreeting() {
        const h = new Date().getHours();
        if (h < 12) return 'BOM DIA';
        if (h < 18) return 'BOA TARDE';
        return 'BOA NOITE';
    }
    function getTodayLabel() {
        const d = new Date();
        const dias  = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
        const meses = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
        return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
    }
    function getPlanStart() {
        try {
            const s = localStorage.getItem('regata_plan_start');
            if (s) return s;
            const today = new Date().toLocaleDateString('sv');
            localStorage.setItem('regata_plan_start', today);
            return today;
        } catch { return new Date().toLocaleDateString('sv'); }
    }
    function getWeekIdx() {
        const start = new Date(getPlanStart() + 'T00:00:00');
        const diffDays = Math.floor((Date.now() - start.getTime()) / 86400000);
        return Math.min(Math.max(Math.floor(diffDays / 7) + 1, 1), 4);
    }
    function getHistory() {
        try { return JSON.parse(localStorage.getItem('regata_history') || '[]'); } catch { return []; }
    }
    function saveToHistory(entry) {
        try {
            const hist = getHistory().filter(e => e.date !== entry.date);
            hist.push(entry);
            hist.sort((a, b) => a.date.localeCompare(b.date));
            localStorage.setItem('regata_history', JSON.stringify(hist.slice(-90)));
        } catch { /* storage unavailable */ }
    }
    function getStreak() {
        try {
            const s = JSON.parse(localStorage.getItem('regata_streak') || 'null');
            return s || { count: 0, lastDate: null, best: 0 };
        } catch { return { count: 0, lastDate: null, best: 0 }; }
    }
    function updateStreak() {
        try {
            const today = new Date().toLocaleDateString('sv');
            const s = getStreak();
            if (s.lastDate === today) return s;
            const yesterday = new Date(Date.now() - 86400000).toLocaleDateString('sv');
            const newCount = (s.lastDate === yesterday) ? s.count + 1 : 1;
            const newBest  = Math.max(s.best || 0, newCount);
            const updated  = { count: newCount, lastDate: today, best: newBest };
            localStorage.setItem('regata_streak', JSON.stringify(updated));
            return updated;
        } catch { return getStreak(); }
    }

                                                    {vals.map((v,i) => (

    function TSBChart() {
        const W = 300, H = 60;
        const fit  = [62,63,64,65,65,66,67,68];
        const fatg = [55,58,62,64,62,60,60,60];
        const frm  = [7, 5, 2, 1, 3, 6, 7, 8];
        const allV = [...fit,...fatg,...frm];
        const mn = Math.min(...allV), mx = Math.max(...allV), rng = mx - mn;
        function pts(d) {
            return d.map((v,i) => {
                const x = (i/(d.length-1))*W;
                const y = H - ((v-mn)/rng)*(H-8) - 4;
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(' ');
        }
        return (
            <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
                <polyline points={pts(fit)}  fill="none" stroke="rgba(61,184,122,0.75)"   strokeWidth="1.5"/>
                <polyline points={pts(fatg)} fill="none" stroke="rgba(232,122,69,0.75)"   strokeWidth="1.5" strokeDasharray="5,3"/>
                <polyline points={pts(frm)}  fill="none" stroke="rgba(245,240,232,0.45)"  strokeWidth="1.5" strokeDasharray="3,2"/>
            </svg>
        );
    }

    function TelaSessionAtiva({ session, onClose }) {
        const sections = React.useMemo(() => {
            if (!session) return [];
            return getSessionSections(session.day.type, getAvaliacao(), getCardioMode());
        }, [session]);

        const allExercises = React.useMemo(() =>
            sections.flatMap((sec, si) =>
                sec.items.map((item, ii) => ({ id:`s${si}-i${ii}`, section:sec.title, color:sec.color, ...item }))
            ), [sections]);

        const today = new Date().toLocaleDateString('sv');

        const [doneIds,   setDoneIds]   = React.useState(() => { const s=getSessionState(); return (s&&!s.completed)?(s.doneIds||[]): []; });
        const [elapsed,   setElapsed]   = React.useState(() => { const s=getSessionState(); return (s&&s.startedAt)?Math.floor((Date.now()-s.startedAt)/1000):0; });
        const [phase,     setPhase]     = React.useState('exercise'); // 'exercise' | 'rest'
        const [restLeft,  setRestLeft]  = React.useState(0);
        const [restTotal, setRestTotal] = React.useState(0);

        const globalRef = React.useRef(null);
        const restRef   = React.useRef(null);
        const startedAtRef = React.useRef(null);
        if (startedAtRef.current === null) {
            const s = getSessionState();
            startedAtRef.current = (s && s.startedAt) ? s.startedAt : Date.now();
        }

        React.useEffect(() => {
            saveSessionState({ date:today, weekIdx:session?.weekIdx||1, dayType:session?.day.type||'', doneIds, startedAt:startedAtRef.current, completed:false });
            globalRef.current = setInterval(() => setElapsed(Math.floor((Date.now()-startedAtRef.current)/1000)), 1000);
            return () => { clearInterval(globalRef.current); clearInterval(restRef.current); };
        }, []);

        function fmtTime(secs) {
            const m = Math.floor(secs/60), s = secs%60;
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
        function parseRest(str) { const m = String(str||'').match(/(\d+)/); return m ? parseInt(m[1]) : 0; }

        const currentEx = allExercises.find(ex => !doneIds.includes(ex.id));
        const nextEx    = currentEx ? allExercises.find(ex => !doneIds.includes(ex.id) && ex.id !== currentEx.id) : null;
        const allDone   = allExercises.length === 0 || doneIds.length >= allExercises.length;

        function concluirExercicio() {
            if (!currentEx) return;
            const newDone = [...doneIds, currentEx.id];
            const isLast  = newDone.length >= allExercises.length;
            setDoneIds(newDone);
            saveSessionState({ doneIds: newDone });
            const restSecs = parseRest(currentEx.rest);
            if (restSecs > 0 && !isLast) {
                setRestTotal(restSecs);
                setRestLeft(restSecs);
                setPhase('rest');
                restRef.current = setInterval(() => {
                    setRestLeft(v => {
                        if (v <= 1) {
                            clearInterval(restRef.current);
                            setPhase('exercise');
                            return 0;
                        }
                        return v-1;
                    });
                }, 1000);
            } else {
                setPhase('exercise');
            }
        }

        function skipRest() {
            clearInterval(restRef.current);
            setRestLeft(0); setPhase('exercise');
        }

        function encerrarSessao() {
            clearInterval(globalRef.current); clearInterval(restRef.current);
            const totalMs = Date.now() - startedAtRef.current;
            saveSessionState({ completed:true, totalMs, doneIds });
            updateStreak();
            const isMinimo = session?.day.type === 'ativo' || totalMs < 15 * 60 * 1000;
            saveToHistory({ date:new Date().toLocaleDateString('sv'), weekIdx:session?.weekIdx||1, dayType:session?.day.type||'', totalMs, isMinimo });
            onClose();
        }

        if (!session) return null;
        const progressPct = allExercises.length > 0 ? (doneIds.length / allExercises.length) * 100 : 0;
        const CIRC = 2 * Math.PI * 54;

        return (
            <div style={{position:'fixed',inset:0,background:'var(--bg)',zIndex:200,display:'flex',flexDirection:'column',overflow:'hidden'}}>
                {/* Topbar */}
                <div style={{padding:'14px 20px 8px',flexShrink:0}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                        <div>
                            <div style={{fontSize:8,fontWeight:700,letterSpacing:'1.5px',color:'rgba(245,240,232,0.38)',marginBottom:2}}>
                                SESSÃO ATIVA · {new Date().toLocaleDateString('pt-BR',{weekday:'short'}).toUpperCase()}
                            </div>
                            <div style={{fontSize:13,fontWeight:700,color:'#f5f0e8'}}>{session.day.name}</div>
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                            <div style={{fontFamily:'var(--font-display)',fontSize:20,fontWeight:700,color:'rgba(245,240,232,0.45)',fontVariantNumeric:'tabular-nums'}}>{fmtTime(elapsed)}</div>
                            <div onClick={onClose} style={{width:28,height:28,borderRadius:'50%',background:'rgba(245,240,232,0.08)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'rgba(245,240,232,0.5)',fontSize:14}}>✕</div>
                        </div>
                    </div>
                    <div style={{background:'rgba(245,240,232,0.08)',borderRadius:4,height:3}}>
                        <div style={{height:3,borderRadius:4,background:'#3db87a',width:`${progressPct}%`,transition:'width 0.4s'}}/>
                    </div>
                </div>

                {/* Content */}
                <div style={{flex:1,overflowY:'auto',padding:'0 20px',WebkitOverflowScrolling:'touch'}}>
                    {allDone ? (
                        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'80%',textAlign:'center'}}>
                            <div style={{fontSize:52,marginBottom:14}}>🎯</div>
                            <div style={{fontFamily:'var(--font-display)',fontSize:32,fontWeight:600,color:'#3db87a',marginBottom:8}}>Sessão completa!</div>
                            <div style={{fontSize:14,color:'rgba(245,240,232,0.45)'}}>Duração total: {fmtTime(elapsed)}</div>
                        </div>
                    ) : phase === 'rest' ? (
                        /* ── REST PHASE ── */

    function TelaWeDonotStop({ onClose }) {

        const minimos = history.filter(e =>  e.isMinimo).length;
        const total   = history.length;
        const best    = streak.best || streak.count;
        const prev    = best > streak.count ? best : (streak.count > 1 ? streak.count - 1 : 0);

        const planStartFormatted = (() => {
            const d = new Date(planStart + 'T00:00:00');
            const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
            return `${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;

        const sinceText = total === 0
            ? 'Nenhuma sessão registrada ainda.'

        return (
            <div className="overlay">
                <div className="overlay-topbar">
                    <div className="overlay-close" onClick={onClose}>
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1L11 11M11 1L1 11" stroke="#f5f0e8" strokeWidth="2" strokeLinecap="round"/></svg>
                    </div>
                    <div className="overlay-title-lbl">WE DON'T STOP</div>
                </div>
                <div className="wds-hero">
                    <div className="wds-big">{streak.count}</div>
                    <div className="wds-subtitle">dias sem soltar a corda.</div>
                    <div className="wds-since">{sinceText}</div>
                </div>
                <div className="heatmap-section">
                    <div className="heatmap-label">ÚLTIMOS 12 MESES</div>
                    <Heatmap weeks={38}/>
                    <div className="heat-legend">
                        <div className="heat-legend-item"><div className="heat-legend-dot" style={{background:'#c84b38'}}/>Sessão plena</div>
                        <div className="heat-legend-item"><div className="heat-legend-dot" style={{background:'#f0c52e'}}/>Mínimo</div>
                    </div>
                </div>
                <div className="planob-card">
                    <div className="planob-label">PLANO B · MANUTENÇÃO MÍNIMA</div>
                    <div className="planob-title">Dia de mar ruim? 10 minutos de mobilidade mantém o nó.</div>
                    <div className="planob-quote">"A corda não é sobre intensidade. É sobre não soltar. O dia que você não pode dar 100%, dá 10."</div>
                </div>
                <div className="wds-stats-grid">

                        {label:'RECORDE',  num:String(streak.count), fill:1,                                                                    color:'#c84b38'},
                        {label:'MELHOR',   num:String(best),         fill: best>0 ? Math.min(streak.count/best,1) : 0,                          color:'rgba(245,240,232,0.3)'},
                        {label:'PLENOS',   num:String(plenos),       fill: total>0 ? Math.min(plenos/Math.max(streak.count,1),1) : 0,            color:'#c84b38'},
                        {label:'MÍNIMOS',  num:String(minimos),      fill: total>0 ? Math.min(minimos/Math.max(streak.count,1),1) : 0,           color:'#f0c52e'},
                    ].map((s,i) => (
                        <div key={i} className="wds-stat-card">
                            <div className="wds-stat-label">{s.label}</div>
                            <div className="wds-stat-num">{s.num}</div>
                            <div className="wds-bar-bg"><div className="wds-bar-fill" style={{width:`${s.fill*100}%`,background:s.color}}/></div>
                        </div>
                    ))}
                </div>
            </div>
        );
    }

    function TelaModuRegata({ onClose }) {
        const TAPER_DAYS = 8;
        const nextEvent = getNextEvent();
        const daysLeft = nextEvent ? getRaceDaysLeft(nextEvent.date) : null;

        // Build taper bar data from race date
        const bars = React.useMemo(() => {
            const today = new Date(); today.setHours(0,0,0,0);
            return Array.from({length: TAPER_DAYS}, (_, i) => {
                const daysBeforeRace = TAPER_DAYS - 1 - i; // 7..0
                const pct = 0.20 + 0.70 * (daysBeforeRace / (TAPER_DAYS - 1));
                let barDay = '';
                let isToday = false;
                if (nextEvent) {
                    const raceDt = new Date(nextEvent.date + 'T00:00:00');
                    const barDt = new Date(raceDt);
                    barDt.setDate(raceDt.getDate() - daysBeforeRace);
                    barDay = String(barDt.getDate());
                    isToday = barDt.getTime() === today.getTime();
                } else {
                    const barDt = new Date(today);
                    barDt.setDate(today.getDate() + i);
                    barDay = String(barDt.getDate());
                    isToday = i === 0;
                }
                return { day: barDay, pct, today: isToday, daysBeforeRace };
            });
        }, [nextEvent && nextEvent.date]);

        function barClass(b) {
            if (b.today) return 'taper-bar-today';
            if (daysLeft === null || daysLeft > 7) return 'taper-bar-taper';
            if (daysLeft < 0) return 'taper-bar-base';
            return b.daysBeforeRace > daysLeft ? 'taper-bar-base' : 'taper-bar-taper';
        }

        // Event display
        let raceName = 'SEM EVENTO PRÓXIMO';
        let dateLabel = '–';
        if (nextEvent) {
            const parts = [nextEvent.name, nextEvent.location].filter(Boolean);
            raceName = parts.join(' · ').toUpperCase();
            const dt = new Date(nextEvent.date + 'T00:00:00');
            const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
            dateLabel = `${dt.getDate()} ${meses[dt.getMonth()]}`;
        }

        // Session recommendation based on daysLeft
        function getSessionInfo() {
            if (daysLeft === null || daysLeft > TAPER_DAYS) {
                const txt = daysLeft !== null ? `Taper começa em ${daysLeft - TAPER_DAYS + 1} dias.` : 'Adicione um evento no calendário para ativar o taper.';
                return { title: 'Treino Normal', note: txt, badge: null, reduction: null };
            }
            if (daysLeft === 0) return { title: 'Dia de Regata', note: 'Foco total. Aquecimento leve + hidratação.', badge: 'REGATA', reduction: null };
            if (daysLeft < 0) return { title: 'Pós-Regata', note: 'Recuperação ativa. Mobilidade e descanso.', badge: null, reduction: null };
            const pctCut = Math.round((1 - (0.20 + 0.70 * (daysLeft / (TAPER_DAYS - 1)))) * 100);
            if (daysLeft >= 5) return { title: 'Força & Core', note: `Reduzi 1 série nos compostos. Core mantém. Mobilidade +5min.`, badge: 'TAPER', reduction: pctCut };
            if (daysLeft >= 2) return { title: 'Ativação Neuromuscular', note: 'Séries curtas, alta velocidade. Sem falha muscular.', badge: 'TAPER', reduction: pctCut };
            return { title: 'Descanso Ativo', note: 'Mobilidade 20min. Nada mais. Preserva energia para amanhã.', badge: 'TAPER', reduction: null };
        }
        const sessionInfo = getSessionInfo();

        // Pre-race checklist (auto-checked based on proximity)
        const checklist = (daysLeft !== null && daysLeft >= 0 && daysLeft <= 14) ? [
            { txt: 'Verificar equipamento e vela',    done: daysLeft <= 10 },
            { txt: 'Hidratação — 3L/dia',             done: daysLeft <= 7  },
            { txt: 'Logística e transporte',          done: daysLeft <= 4  },
            { txt: 'Descanso — dormir 8h por noite',  done: false          },
        ] : [];

        // Taper description
        let taperDesc = 'Prévia do taper automático nos últimos 8 dias.';
        if (daysLeft !== null && daysLeft >= 0 && daysLeft <= 7) {
            const pctCut = Math.round((1 - (0.20 + 0.70 * (daysLeft / (TAPER_DAYS - 1)))) * 100);
            taperDesc = `Volume reduz ${pctCut}% até a regata.`;
        } else if (daysLeft !== null && daysLeft < 0) {
            taperDesc = 'Ciclo de taper concluído.';
        }

        const wind = [
            { dow:'QUI', dd:'24', dir:'NE', kt:8,  raj:12, onda:'0.4k', temp:'23', q:'LEVE',  qc:'wq-leve'  },
            { dow:'SEX', dd:'25', dir:'E',  kt:14, raj:19, onda:'0.8k', temp:'24', q:'BOM',   qc:'wq-bom'   },
            { dow:'SAB', dd:'26', dir:'SE', kt:18, raj:24, onda:'1.2k', temp:'23', q:'FORTE', qc:'wq-forte' },
            { dow:'DOM', dd:'27', dir:'E',  kt:12, raj:16, onda:'0.6k', temp:'23', q:'IDEAL', qc:'wq-ideal' },
        ];

        return (
            <div className="overlay">
                <div className="overlay-topbar">
                    <div className="overlay-close" onClick={onClose}>
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1L11 11M11 1L1 11" stroke="#f5f0e8" strokeWidth="2" strokeLinecap="round"/></svg>
                    </div>
                    <div className="overlay-title-lbl" style={{color:'var(--card-coral)'}}>MODO REGATA · {nextEvent ? 'ATIVO' : 'SEM EVENTO'}</div>
                </div>
                <div className="mr-hero">
                    <div className="mr-regata-label">{raceName}</div>
                    {nextEvent ? (
                        <div className="mr-countdown-row">
                            <div className="mr-big-num">{daysLeft >= 0 ? daysLeft : Math.abs(daysLeft)}</div>
                            <div className="mr-dias">{daysLeft > 0 ? 'dias' : daysLeft === 0 ? 'hoje!' : 'dias atrás'}</div>
                        </div>
                    ) : (
                        <div style={{margin:'24px 0',fontSize:13,color:'rgba(245,240,232,0.45)',lineHeight:1.6,textAlign:'center'}}>
                            Adicione um evento no perfil<br/>para ativar o modo regata.
                        </div>
                    )}
                    <div className="mr-dates">{dateLabel}</div>
                    <div className="taper-card">
                        <div className="taper-top">
                            <div className="taper-label">TAPER AUTOMÁTICO · 8 DIAS</div>
                            <div className="taper-auto-badge">AUTO</div>
                        </div>
                        <div className="taper-title">{taperDesc}</div>
                        <div className="today-label">HOJE</div>
                        <div className="taper-bars">
                            {bars.map((b,i) => (
                                <div key={i} className={`taper-bar ${barClass(b)}`}
                                    style={{height:`${b.pct*100}%`}}/>
                            ))}
                        </div>
                        <div className="taper-x-labels">
                            {bars.map((b,i) => <div key={i} className="taper-x-lbl">{b.day}</div>)}
                        </div>
                        <div className="taper-range-labels">
                            <span className="taper-range-lbl">BASE 90%</span>
                            <span className="taper-range-lbl">REGATA 20%</span>
                        </div>
                    </div>
                </div>
                <div className="wind-section">
                    <div className="wind-header">
                        <div className="wind-label">PREVISÃO · WINDY</div>
                        <div className="wind-updated">em breve</div>
                    </div>
                    {wind.map((w,i) => (
                        <div key={i} className="wind-row">
                            <div className="wind-date">
                                <div className="wind-day">{w.dow}</div>
                                <div className="wind-dd">{w.dd}</div>
                            </div>
                            <div className="wind-dir-badge">{w.dir}</div>
                            <div className="wind-info">
                                <div className="wind-speed">{w.kt} kt <span style={{fontWeight:400,fontSize:11,color:'var(--muted-dark)'}}>raj {w.raj}</span></div>
                                <div className="wind-details">onda {w.onda} · {w.temp}°C</div>
                            </div>
                            <div className={`wind-quality ${w.qc}`}>{w.q}</div>
                        </div>
                    ))}
                    <div style={{marginTop:20,marginBottom:10,fontSize:9,fontWeight:600,letterSpacing:1.6,textTransform:'uppercase',color:'var(--muted-dark)'}}>
                        SESSÃO DE HOJE · AJUSTADA
                    </div>
                    <div style={{background:'var(--card-navy)',borderRadius:16,padding:'16px 18px',marginBottom:20}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                            <div style={{fontFamily:'var(--font-display)',fontSize:26,fontStyle:'italic',fontWeight:500,color:'var(--text-cream)'}}>{sessionInfo.title}</div>
                            {sessionInfo.badge && <div style={{background:'var(--card-coral)',color:'#fff',fontSize:9,fontWeight:700,letterSpacing:1,padding:'3px 9px',borderRadius:4,textTransform:'uppercase',flexShrink:0,marginLeft:10}}>{sessionInfo.badge}</div>}
                        </div>
                        {sessionInfo.reduction !== null && <div style={{fontSize:12,color:'rgba(245,240,232,0.5)',marginBottom:10}}>-{sessionInfo.reduction}% volume</div>}
                        <div style={{fontSize:12,color:'rgba(245,240,232,0.65)',lineHeight:1.5}}>{sessionInfo.note}</div>
                    </div>
                    {checklist.length > 0 && <div>
                        <div style={{marginBottom:10,fontSize:9,fontWeight:600,letterSpacing:1.6,textTransform:'uppercase',color:'var(--muted-dark)'}}>
                            PRÉ-REGATA · {daysLeft} {daysLeft === 1 ? 'DIA' : 'DIAS'}
                        </div>
                        {checklist.map((item,i) => (
                            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid rgba(245,240,232,0.06)'}}>
                                <div style={{width:20,height:20,borderRadius:6,flexShrink:0,
                                    background:item.done?'var(--card-coral)':'transparent',
                                    border:item.done?'none':'1.5px solid rgba(245,240,232,0.2)',
                                    display:'flex',alignItems:'center',justifyContent:'center'}}>
                                    {item.done && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                                </div>
                                <div style={{fontSize:13,color:item.done?'rgba(245,240,232,0.35)':'rgba(245,240,232,0.8)',
                                    textDecoration:item.done?'line-through':'none'}}>{item.txt}</div>
                            </div>
                        ))}
                    </div>}
                </div>
            </div>
        );
    }

    function TelaPerfil({ setModal, sailingMode, setSailingMode }) {
        const [profile, setProfile] = React.useState(getProfile);
        const [editing, setEditing] = React.useState(false);
        const [draft, setDraft] = React.useState(null);
        const [events, setEvents] = React.useState(getEvents);
        const [eventModal, setEventModal] = React.useState(null); // null | 'add' | event obj
        const [evDraft, setEvDraft] = React.useState({ name:'', date:'', location:'' });

        function startEdit() { setDraft({...profile}); setEditing(true); }
        function cancelEdit() { setEditing(false); setDraft(null); }
        function saveEdit() { saveProfile(draft); setProfile(getProfile()); setEditing(false); setDraft(null); }
        function set(k, v) { setDraft(d => ({...d, [k]: v})); }

        function openAddEvent() { setEvDraft({ name:'', date:'', location:'' }); setEventModal('add'); }
        function openEditEvent(ev) { setEvDraft({...ev}); setEventModal(ev); }
        function saveEvent() {
            if (!evDraft.name || !evDraft.date) return;
            let updated;
            if (eventModal === 'add') {
                updated = [...events, { id: Date.now().toString(), ...evDraft }];
            } else {
                updated = events.map(e => e.id === eventModal.id ? { ...e, ...evDraft } : e);
            }
            updated.sort((a,b) => a.date.localeCompare(b.date));
            saveEvents(updated);
            setEvents(updated);
            setEventModal(null);
        }
        function deleteEvent(id) {
            const updated = events.filter(e => e.id !== id);
            saveEvents(updated);
            setEvents(updated);
        }

        const today = new Date(); today.setHours(0,0,0,0);
        const upcoming = events.filter(e => new Date(e.date+'T00:00:00') >= today).sort((a,b)=>a.date.localeCompare(b.date));
        const past     = events.filter(e => new Date(e.date+'T00:00:00') <  today).sort((a,b)=>b.date.localeCompare(a.date));

        const MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
        function EventRow({ ev, isPast }) {
            const d = new Date(ev.date+'T00:00:00');
            const daysLeft = Math.ceil((d - today) / 86400000);

                <div onClick={() => openEditEvent(ev)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid rgba(24,25,31,0.06)',cursor:'pointer'}}>

                    </div>

                        {!isPast && <div style={{fontSize:11,fontWeight:600,color:'#3db87a'}}>{daysLeft}d</div>}
                        <button onClick={e=>{e.stopPropagation();deleteEvent(ev.id);}} style={{background:'none',border:'none',padding:'4px 6px',cursor:'pointer',color:'rgba(24,25,31,0.25)',fontSize:16,lineHeight:1}}>×</button>

                    {/* CALENDÁRIO DE EVENTOS */}

                    </div>

                {/* ── Modal editar perfil ── */}

                            </div>
                            {[

                                <div key={f.key} style={{marginBottom:18}}>
                                    <div style={{fontSize:9,fontWeight:700,letterSpacing:1.6,textTransform:'uppercase',color:'rgba(24,25,31,0.4)',marginBottom:6}}>{f.label}</div>

                                SALVAR EVENTO
                            </button>

        const [idx, setIdx] = useState(0);

        function next() {
            if (isLast) { localStorage.setItem('regata_onboarded','1'); onComplete(); }

        return (
            <div className="ob-wrap" style={{background: s.bg}}>
                <div className="ob-body">
                    <div className="ob-mantra-lbl" style={{color: s.mc}}>MANTRA · {s.n}</div>

        function stepContent(s) {
            if (s <= 2) return ['perfil','contexto'][s-1];
            const seq = includeHiking
                ? ['hiking','core','forca','endurance','mobilidade','resultado']
                : ['core','forca','endurance','mobilidade','resultado'];
            return seq[s-3] || 'resultado';
        }

        // Step 2: Contexto

        // Step 4: Core
        const [plankSecs, setPlankSecs] = useState(95);

        const plankRef = useRef(null);

        // Step 5: Força
        const [pushReps,   setPushReps]   = useState(null);
        const [pullReps,   setPullReps]   = useState(null);
        const [squatReps,  setSquatReps]  = useState(null);

        // Step 6: Endurance
        const [endType, setEndType] = useState('cooper');
        const [endDist, setEndDist] = useState('2600');
        const [rpe, setRpe] = useState(7);
        const [useHR, setUseHR] = useState(false);
        const [hrMax, setHrMax] = useState(185);
        const [hrRest, setHrRest] = useState(52);

        // Step 6: Mobilidade
        const [mobScores, setMobScores] = useState({quadrilPost:null, ombroColuna:null, equilibrio:null, respiracao:null});

        useEffect(() => () => {
            clearInterval(hikingRef.current);
            clearInterval(plankRef.current);
        }, []);

        const mm = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        const parseMmSs = str => { const p = (str||'').split(':'); return p.length===2 ? (parseInt(p[0])||0)*60+(parseInt(p[1])||0) : (parseInt(str)||0); };

        function toggleHiking() {
            if (!hikingOn) {
                setHikingVal(0); setHikingOn(true);
                hikingRef.current = setInterval(() => setHikingVal(v => v+1), 1000);
            } else {
                clearInterval(hikingRef.current); setHikingOn(false);
                setHikingSecs(hikingVal);
            }
        }

        function togglePlank() {
            if (!plankOn) {
                setPlankVal(0); setPlankOn(true);
                plankRef.current = setInterval(() => setPlankVal(v => v+1), 1000);
            } else {
                clearInterval(plankRef.current); setPlankOn(false);
                setPlankSecs(plankVal);
            }
        }

        function toggleEquip(e) {
            setEquipamentos(prev => prev.includes(e) ? prev.filter(x => x!==e) : [...prev, e]);
        }

        const scores = useMemo(() => {
            const hiking    = includeHiking ? Math.min(100, Math.round(hikingSecs/240*100)) : 0;
            const core      = Math.min(100, Math.round(plankSecs/180*100));
            let endurance = 0;
            const ev = parseFloat(endDist)||0;
            if (endType==='cooper')  endurance = Math.min(100, Math.round(ev/2800*100));
            else if (endType==='remo')    { const s=parseMmSs(endDist); endurance = s>0 ? Math.min(100,Math.round(420/s*100)) : 0; }
            else if (endType==='bike')    endurance = Math.min(100, Math.round(ev/5*100));
            else if (endType==='burpees') { const s=parseMmSs(endDist); endurance = s>0 ? Math.min(100,Math.round(600/s*100)) : 0; }
            const mobVals = Object.values(mobScores).filter(v=>v!=null);
            const mobilidade = mobVals.length ? Math.min(100, Math.round(mobVals.reduce((a,b)=>a+b,0)/mobVals.length/5*100)) : 0;
            const pushScore  = pushReps  != null ? Math.min(100, Math.round(pushReps/50*100))  : 0;
            const pullScore  = pullReps  != null ? Math.min(100, Math.round(pullReps/18*100))  : 0;
            const squatScore = squatReps != null ? Math.min(100, Math.round(squatReps/55*100)) : 0;
            const forca = Math.round((pushScore + pullScore + squatScore) / 3);
            return { hiking, core, forca, endurance, mobilidade };
        }, [includeHiking, hikingSecs, plankSecs, endType, endDist, mobScores, pushReps, pullReps, squatReps]);

        const canNext = () => {
            if (step===1) {
                if (!esporte) return false;
                if (esporte === 'velejador') return tipoBarco !== null;
                return true;
            }
            if (step===2) return objetivo!==null;
            const sc = stepContent(step);
            if (sc==='hiking')     return hikingSecs>0;
            if (sc==='core')       return plankSecs > 0;
            if (sc==='forca')      return pushReps !== null && pullReps !== null && squatReps !== null;
            if (sc==='endurance')  return endDist.trim()!=='';
            if (sc==='mobilidade') return Object.values(mobScores).every(v=>v!==null);
            return true;
        };

        function renderResultado() {
            const activeScores = includeHiking ? Object.values(scores) : [scores.core, scores.forca, scores.endurance, scores.mobilidade];
            const avg = Math.round(activeScores.reduce((a,b)=>a+b,0)/activeScores.length);
            const hikingLevel = hikingSecs>=240?5:hikingSecs>=180?4:hikingSecs>=120?3:hikingSecs>=60?2:1;
            const hikingLevelName = ['Iniciante','Intermediário','Avançado','Elite','World Class'][hikingLevel-1];
            const archetype = avg>=65?'Regatista':avg>=50?'Atleta':'Iniciante';
            const pillars = [
                ...(includeHiking ? [{k:'hiking', l:'Hiking', c:'#e87a45'}] : []),
                {k:'core',       l:'Core',      c:'#9b7dd4'},
                {k:'forca',      l:'Força',     c:'#c84b38'},

    /* ══════════════════════ PLANO ══════════════════════ */
    const PLAN_DAYS = ['SEG','TER','QUA','QUI','SEX','SAB','DOM'];
    const TODAY_IDX = (new Date().getDay() + 6) % 7;
    const PLAN_BADGE = {
        hiking:    {label:'HIKING',     bg:'rgba(74,143,217,0.12)',  c:'#4a8fd9'},
        forca:     {label:'FORÇA',      bg:'rgba(232,122,69,0.12)',  c:'#e87a45'},
        endurance: {label:'ENDURANCE',  bg:'rgba(61,184,122,0.12)',  c:'#2d6b4f'},
        core:      {label:'CORE',       bg:'rgba(155,125,212,0.12)', c:'#9b7dd4'},
        ativo:     {label:'ATIVO',      bg:'rgba(61,184,122,0.08)',  c:'#3db87a'},
        descanso:  {label:'DESCANSO',   bg:'rgba(24,25,31,0.06)',    c:'rgba(24,25,31,0.35)'},
    };
    function getPlanWeeks(aval) {
        const scores = aval ? aval.scores : null;
        const DAY_NAMES = {
            endurance: [
                {name:'Corrida base Z2',       sub:'Ritmo conversacional · zona 2',     dur:'40 min'},

                {name:'Hiking bench + Core',   sub:'Isometria + prancha EMOM',          dur:'35 min'},
                {name:'Hiking + Hollow rocks', sub:'Qualidade > quantidade',            dur:'35 min'},
                {name:'Hiking + série extra',  sub:'Adição de 1 série isométrica',      dur:'45 min'},
                {name:'Técnica · vol. baixo',  sub:'Qualidade · sem fadiga acumulada',  dur:'20 min'},
            ],
            forca: [
                {name:'Circuito funcional',    sub:'Agachamento · remada · push-up',    dur:'40 min'},

                {name:'Core + mobilidade',     sub:'Suave · sem intensidade alta',      dur:'25 min'},
            ],

                {name:'Mobilidade ativa',      sub:'Rolamento + mobilidade de quadril', dur:'20 min'},
                {name:'Mobilidade ativa',      sub:'Rolamento + trabalho de ombro',     dur:'20 min'},
                {name:'Caminhada ativa',       sub:'Recuperação leve',                  dur:'20 min'},

            descanso: [
                {name:'Descanso', sub:'', dur:''},
                {name:'Descanso', sub:'', dur:''},
                {name:'Descanso', sub:'', dur:''},
                {name:'Descanso', sub:'', dur:''},

        function d(type, wi) { return { type, ...DAY_NAMES[type][wi] }; }

        const trainable = [
            {t:'hiking',    s: scores?.hiking    ?? 50},
            {t:'core',      s: scores?.core      ?? 50},
            {t:'forca',     s: scores?.forca     ?? 50},
            {t:'endurance', s: scores?.endurance ?? 50},
        ].sort((a, b) => a.s - b.s);
        // endurance e core são base do treino de vela — sempre 2× por semana
        const flex = trainable.filter(x => x.t !== 'endurance' && x.t !== 'core');
        const [f0, f1] = flex.map(x => x.t); // 2 tipos restantes (hiking, forca), ordenados do mais fraco
        // 5 slots fixos: endurance×2 + core×2 + 1 slot para o pilar mais fraco dos restantes
        const types = ['endurance', 'core', f0, 'endurance', 'core'];

        const META = [
            {id:1, tag:'SEMANA 1 DE 4', name:'Base & padrão', desc:'Volume base · 60–70% · postura e respiração'},

            ...m,
            days: wi < 3
                ? [d(types[0],wi), d(types[1],wi), d('ativo',wi), d(types[2],wi), d(types[3],wi), d(types[4],wi), d('descanso',wi)]

        hiking: [
            { title:'AQUECIMENTO', color:'#4a8fd9', items:[
                {name:'Agachamento parcial',    detail:'2 × 15 rep',   rest:'45s'},
                {name:'Mobilidade de joelho',   detail:'2 × 10 rep',   rest:''},

            { title:'TRABALHO PRINCIPAL', color:'#4a8fd9', items:[

        forca: [
            { title:'AQUECIMENTO', color:'#e87a45', items:[

                        {['corrida','bike','remo'].map(m => (
                            <button key={m} onClick={() => pickCardio(m)} style={{
                                padding:'5px 12px', borderRadius:20, border:'none', cursor:'pointer',
                                fontSize:10, fontWeight:700, letterSpacing:'0.6px', textTransform:'uppercase',
                                background: cardioMode===m ? '#18191f' : 'rgba(24,25,31,0.07)',
                                color: cardioMode===m ? '#fff' : 'rgba(24,25,31,0.5)',
                                transition:'all 0.15s',
                            }}>{m}</button>
                        ))}
                    </div>
                )}
                {sections.map((sec, si) => (
                    <div key={si} className="sd-section">
                        <div className="sd-sec-title">{sec.title}</div>
                        {sec.items.map((ex, ei) => (
                            <div key={ei} className="sd-exer">
                                <div className="sd-exer-dot" style={{background: sec.color}}/>
                                <div className="sd-exer-info">
                                    <div className="sd-exer-name">{ex.name}</div>
                                    <div className="sd-exer-detail">{ex.detail}</div>
                                </div>
                                {ex.rest && <div className="sd-exer-rest">↺ {ex.rest}</div>}
                            </div>
                        ))}
                    </div>
                ))}
                <div className="sd-footer">
                    <button className="sd-cta" onClick={() => openSession?.({ day: session, weekIdx })}>Iniciar sessão →</button>
                </div>
            </div>
        );
    }

    function TelaPlano({ openSession }) {
        const [week, setWeek] = useState(getWeekIdx);
        const [selected, setSelected] = useState(null);
        const w = PLAN_WEEKS.find(x => x.id === week);

        if (selected) {
            return <TelaSessaoDetalhe
                session={selected.day}
                dayLabel={`${PLAN_DAYS[selected.idx]} · S${week}`}
                weekName={w.name}
                weekIdx={week}
                openSession={openSession}
                onBack={() => setSelected(null)}/>;
        }

        return (
            <div className="plano-wrap">
                <div className="plano-topbar">
                    <div>
                        <div className="plano-tag">MEU PROGRAMA</div>
                        <div className="plano-heading">Plano de treino</div>
                    </div>
                    <div style={{width:38, height:38, borderRadius:'50%', background:'var(--card-navy)', backgroundImage:'var(--navy-texture)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <circle cx="8" cy="8" r="5.5" stroke="rgba(245,240,232,0.55)" strokeWidth="1.4"/>
                            <path d="M8 5.5V8l1.5 1.5" stroke="rgba(245,240,232,0.8)" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                    </div>
                </div>
                <div className="plano-week-scroll">
                    {PLAN_WEEKS.map(pw => (
                        <button key={pw.id} className={`plano-week-tab${week===pw.id?' wt-on':''}`}
                            onClick={() => setWeek(pw.id)}>
                            S{pw.id} · {pw.name}
                        </button>
                    ))}
                </div>
                <div className="plano-summary">
                    <div className="plano-summ-tag">{w.tag}</div>
                    <div className="plano-summ-title">{w.name}</div>
                    <div className="plano-summ-desc">{w.desc}</div>
                </div>
                <div className="plano-days">
                    {w.days.map((d, i) => {
                        const b = PLAN_BADGE[d.type];
                        const isRest = d.type === 'descanso';
                        const isToday = i === TODAY_IDX;
                        return (
                            <div key={i}
                                className={`plano-day${isRest?' rest':''}${isToday?' today':''}`}
                                style={!isRest?{cursor:'pointer'}:{}}
                                onClick={() => !isRest && setSelected({day:d, idx:i})}>
                                <div className="plano-day-lbl">
                                    {PLAN_DAYS[i]}
                                    {isToday && <div style={{width:4, height:4, borderRadius:'50%', background:'var(--card-coral)', margin:'3px auto 0'}}/>}
                                </div>
                                {!isRest && <div className="plano-day-badge" style={{background:b.bg, color:b.c}}>{b.label}</div>}
                                <div className="plano-day-info">
                                    <div className="plano-day-name" style={isRest?{color:'rgba(24,25,31,0.35)'}:{}}>{d.name}</div>
                                    {d.sub && <div className="plano-day-sub">{d.sub}</div>}
                                </div>
                                {d.dur && <div className="plano-day-dur">{d.dur}</div>}
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    }

    /* ══════════════════════ APP ROOT ══════════════════════ */
    function App() {
        const [onboarded,    setOnboarded]    = useState(() => localStorage.getItem('regata_onboarded') === '1');
        const [sailingMode,  setSailingMode]  = useState(() => localStorage.getItem('regata_sailing') !== '0');
        const [tab,          setTab]          = useState('hoje');
        const [modal,        setModal]        = useState(null);
        const [refreshKey,   setRefreshKey]   = useState(0);

        const [sessionData, setSessionData] = useState(null);
        const openSession = (data) => { setSessionData(data); setModal('sessao'); };
        const closeModal  = () => { setModal(null); setRefreshKey(k => k + 1); };

        if (!onboarded) return <TelaOnboarding onComplete={() => setOnboarded(true)}/>;

        if (modal === 'sessao')      return <TelaSessionAtiva session={sessionData} onClose={closeModal}/>;
        if (modal === 'weDontStop')  return <TelaWeDonotStop  onClose={closeModal}/>;
        if (modal === 'modoRegata')  return <TelaModuRegata   onClose={closeModal}/>;
        if (modal === 'conexoes')    return <TelaConexoes     onBack={closeModal}/>;
        if (modal === 'planos')      return <TelaPlanos       onBack={closeModal}/>;
        if (modal === 'avaliacao')   return <TelaAvaliacao    onClose={closeModal}/>;

        function toggleSailing(v) {
            setSailingMode(v);
            localStorage.setItem('regata_sailing', v ? '1' : '0');
        }

        const renderTab = () => {
            switch (tab) {
                case 'hoje':      return <TelaHoje      key={refreshKey} setModal={setModal} sailingMode={sailingMode} openSession={openSession}/>;
                case 'plano':     return <TelaPlano openSession={openSession}/>;
                case 'testes':    return <TelaTestes setModal={setModal}/>;
                case 'biblioteca':return <TelaBiblioteca/>;
                case 'pulso':     return <TelaPulso/>;
                case 'perfil':    return <TelaPerfil    setModal={setModal} sailingMode={sailingMode} setSailingMode={toggleSailing}/>;
                default:          return <TelaHoje      key={refreshKey} setModal={setModal} sailingMode={sailingMode} openSession={openSession}/>;
            }
        };

        const showNav = true;

        return (
            <div className="app">
                <div className="screen">
                    {renderTab()}
                </div>
                {showNav && (
                    <div className="bottom-nav">
                        {navItems.map(({id,label}) => (
                            <div key={id} className={`nav-tab ${tab===id?'active':''}`} onClick={() => setTab(id)}>
                                <div className="nav-icon">{NavIcons[id](tab===id)}</div>
                                <div className="nav-lbl">{label}</div>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    }

    ReactDOM.render(<App/>, document.getElementById('root'));
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/we-dont-stop/sw.js');
        });
    }
</script>
</body>
</html>
